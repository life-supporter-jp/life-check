<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マイライフチェック</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
:root { --accent:#2b6cb0; }
* { box-sizing: border-box; }
body{ font-family:sans-serif; margin:0; padding:0; font-size:18px; color:#333; background:#f0f2f5; line-height: 1.5; }
.wrap{ max-width:800px; margin:0 auto; background:#fff; min-height:100vh; padding:20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
@media (max-width:800px) { .wrap { padding:10px; } }

.banner-container img { max-width:100%; height:auto; display:block; margin:0 auto; border-radius:8px; }

.main{ display:flex; flex-direction:column; gap:16px; margin-top:20px; }
nav.toc{ border:1px solid #eee; padding:12px; border-radius:8px; background:#fafafa; max-height:400px; overflow-y:auto; }
nav.toc ul { list-style: none; padding: 0; margin: 0; }
nav.toc li > a { cursor:pointer; text-decoration:none; color:var(--accent); display:block; padding:12px 0; font-weight:bold; border-bottom: 1px solid #eee; }
nav.toc ul ul{ display:none; padding-left:20px; border-top: 1px dashed #ddd; }
nav.toc li.active > ul{ display:block; }
/* 目次の子項目をクリックしやすく */
nav.toc ul ul li a { display: block; padding: 8px 0; color: #555; font-size: 14px; text-decoration: none; cursor: pointer; }
nav.toc ul ul li a:hover { text-decoration: underline; color: var(--accent); }

.content{ border:2px solid #e2e8f0; padding:0 15px; border-radius:8px; height:600px; overflow-y:scroll; -webkit-overflow-scrolling:touch; margin-top:10px; background: #fff; scroll-behavior: smooth; }
.chapter-title{ font-size:20px; font-weight:bold; margin:25px 0 10px; border-left:6px solid var(--accent); padding:5px 12px; background:#f0f4f8; position:sticky; top:0; z-index:5; }

.item{ padding:20px 0; border-bottom:1px solid #eee; }
.item.checked{ background:#e6ffe6; border-left:4px solid #4caf50; padding-left:10px; }

.desc-toggle{ color:#0056b3; cursor:pointer; font-size: 14px; text-decoration: underline; margin: 8px 0; display: inline-block; }
.desc-body{ display:none; background:#f9f9f9; padding:12px; border:1px dotted #ccc; border-radius:4px; font-size:15px; line-height:1.6; margin-bottom:10px; color: #444; }

textarea{ width:100%; min-height:80px; margin-top:10px; border:1px solid #ccc; border-radius:4px; padding:10px; font-size:16px; font-family: inherit; }

.controls{ margin:25px 0; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; border-bottom:2px solid #eee; padding-bottom:20px; }
button{ padding:12px 10px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:14px; min-width:120px; flex:1; }

.footer-info { margin-top:40px; padding:20px 0; }
.info-text { font-size:18px; font-weight:bold; line-height:1.8; margin-bottom:20px; color: #333; }
</style>
</head>
<body>

<div class="wrap">
  <div class="banner-container">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg">
  </div>

  <div style="text-align:center;">
    <p><font size="4" color="#0000ff">これからの人生をどう彩るかという設計図です</font></p>
    <h2 style="font-size:26px; margin: 10px 0;">マイライフチェック</h2>
  </div>

  <div class="main">
    <nav class="toc"><ul id="tocList"></ul></nav>
    <div class="content" id="contentArea"></div>
  </div>

  <div class="controls">
    <button onclick="toggleFilter()" style="background:#555;">未完了のみ</button>
    <button onclick="downloadBackup()">データ保存</button>
    <button onclick="loadJSON()" style="background:#718096;">データ読込</button>
    <button onclick="exportExcel()" style="background:#2f855a;">Excel出力</button>
    <button onclick="importExcel()" style="background:#2f855a;">Excel読込</button>
    <button onclick="window.print()" style="background:#1a202c;">印刷</button>
  </div>

  <div class="footer-info">
    <div class="info-text">
      今回のアプリは如何だったでしょうか？他にも使えるアプリ、脳トレができるゲームや趣味に俳句、和歌などが利用できるサイトをご案内します。また大事な記録をサーバーに残せるサイトで、何かあった時に情報開示も指定できるサイトです。スマホのID、PWを記録しておくと安心です。
    </div>
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg" style="display:block; margin:20px auto; max-width:100%;">
    <div style="text-align:center;"><span style="font-size:24px;"><b>以下より体験版をご確認ください。</b></span></div>
    <p style="text-align:center;"><img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012100.jpg" style="width: 200px;"></p>
    <div style="text-align: center; margin-bottom: 50px;">
      <a href="https://life-supporter.jp/lp/HRSuykFf" style="text-decoration:none;">
        <span style="font-size: 20px; color:blue; font-weight:bold; border-bottom: 1px solid blue;">https://life-supporter.jp/lp/HRSuykFf</span>
      </a>
    </div>
  </div>

  <input type="file" id="jsonFile" style="display:none">
  <input type="file" id="excelFile" style="display:none" accept=".xlsx,.xls">
</div>

<script>
// --- データ定義 ---
const chapters = [
  { id:1, title:"第1章 お金と財産管理", items:["銀行口座の一覧作成","預金通帳・カード整理","年金受給手続き確認","保険契約の整理","株式・不動産情報","借金・ローンの明記","公共料金・サブスク","財産目録の作成","相続税の試算","遺産分割の希望"]},
  { id:2, title:"第2章 介護・生活サポート", items:["介護の希望記録","介護施設候補リスト","介護保険サービス確認","見守り・支援登録","家事・買い物支援","緊急連絡網リスト","身元保証人の確保","介護費用の試算","感謝の手紙","将来の住まい決定"]},
  { id:3, title:"第3章 医療・健康管理", items:["かかりつけ医整理","持病・服薬記録","医療保険証の保管","延命治療の意思表示","臓器提供の意思","入院セット準備","成年後見の検討","緊急医療カード作成","健康診断記録整理","在宅医療体制確認"]},
  { id:4, title:"第4章 心・人生の整理", items:["エンディングノート","家族への感謝の言葉","写真・日記の整理","自分史・年表作成","大切な物の譲り先","デジタル遺品整理","ペットの世話依頼","宗教・信仰の希望","心の不安相談相手","趣味活動の後継者"]},
  { id:5, title:"第5章 葬儀・供養・死後の手続き", items:["葬儀の規模決定","葬儀社の事前相談","お墓の準備決定","納骨・供養の収集","戒名・法名の希望","音楽・花の指定","遺影写真の準備","香典・供物の扱い","死後の連絡先リスト","死後の手続き一覧"]},
  { id:6, title:"第6章 デジタル遺産", items:["スマホ等のロック解除","ID・パスワード保管","ネット銀行・証券","サブスク解約リスト","SNSの死後対応","クラウド写真の整理","キャッシュレス決済","暗号資産・NFT","非公開データの処理","デジタル連絡先"]}
];

const EXPLANATIONS = {
  "ch1-0": "どの銀行にいくらあるか、本人以外でも分かるように一覧にしておきましょう。",
  "ch4-0": "家族への想いや、自分の希望を自由に記すノートです。残された方の道標になります。",
  "ch6-1": "スマホのパスワードは最重要です。信頼できる人にのみ、保管場所を伝えましょう。"
};

let state = JSON.parse(localStorage.getItem("life-check-v100") || "{}");
let filterMode = false;

function idFor(chId, i){ return "item-" + chId + "-" + i; }

// --- 画面描画 ---
function render(){
  const container = document.getElementById("contentArea");
  const scrollPos = container.scrollTop;
  container.innerHTML = "";

  chapters.forEach(ch => {
    const titleDiv = document.createElement("div");
    titleDiv.className = "chapter-title";
    titleDiv.textContent = ch.title;
    container.appendChild(titleDiv);
    
    ch.items.forEach((itemText, i) => {
      const key = idFor(ch.id, i);
      if(!state[key]) state[key] = { checked: false, memo: "" };
      if(filterMode && state[key].checked) return;
      
      const itemDiv = document.createElement("div");
      itemDiv.className = "item" + (state[key].checked ? " checked" : "");
      itemDiv.id = key; // ジャンプ用のIDを設定
      
      const expText = EXPLANATIONS[key] || "この項目の準備状況を確認し、必要があればメモを残してください。";
      
      itemDiv.innerHTML = `
        <label style="display: block; cursor: pointer;">
          <input type="checkbox" ${state[key].checked ? "checked" : ""}> 
          <b>${itemText}</b>
        </label>
        <div>
          <span class="desc-toggle" onclick="toggleDesc('${key}')">▼ 解説を見る</span>
          <div id="desc-${key}" class="desc-body">${expText}</div>
        </div>
        <textarea placeholder="メモを入力...">${state[key].memo || ""}</textarea>
      `;
      
      const cb = itemDiv.querySelector("input");
      const ta = itemDiv.querySelector("textarea");
      cb.onchange = () => { state[key].checked = cb.checked; save(); render(); buildTOC(); };
      ta.oninput = () => { state[key].memo = ta.value; save(); };
      
      container.appendChild(itemDiv);
    });
  });
  container.scrollTop = scrollPos;
}

function toggleDesc(key){
  const el = document.getElementById("desc-" + key);
  if(el) el.style.display = (el.style.display === "block") ? "none" : "block";
}

// 目次をクリックした時のジャンプ処理
function scrollToItem(id) {
  const target = document.getElementById(id);
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function buildTOC(){
  const toc = document.getElementById("tocList");
  toc.innerHTML = "";
  chapters.forEach(ch => {
    const li = document.createElement("li");
    let done = 0;
    ch.items.forEach((_, i) => { if(state[idFor(ch.id, i)]?.checked) done++; });
    const percent = Math.round(done / ch.items.length * 100);
    
    const a = document.createElement("a");
    a.innerHTML = `${ch.title} <span style="color:red">●</span> ${percent}%`;
    a.onclick = () => { li.classList.toggle("active"); };
    
    li.appendChild(a);
    const ul = document.createElement("ul");
    ch.items.forEach((itemText, i) => {
      const subli = document.createElement("li");
      const subA = document.createElement("a");
      const key = idFor(ch.id, i);
      subA.textContent = itemText + (state[key]?.memo ? " ✍" : "");
      subA.onclick = (e) => {
        e.stopPropagation(); // 章の開閉を防ぐ
        scrollToItem(key);
      };
      subli.appendChild(subA);
      ul.appendChild(subli);
    });
    li.appendChild(ul);
    toc.appendChild(li);
  });
}

function save(){ localStorage.setItem("life-check-v100", JSON.stringify(state)); }

// --- ファイル操作 ---
async function downloadBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const f = new File([blob], "life-check.json", {type:"application/json"});
  if(navigator.share && /iPhone|iPad|Android/i.test(navigator.userAgent)){
    try{ await navigator.share({files:[f]}); }catch(e){}
  } else {
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = f.name; a.click();
  }
}

function loadJSON(){ document.getElementById("jsonFile").click(); }
document.getElementById("jsonFile").onchange = (e) => {
  const reader = new FileReader();
  reader.onload = () => { 
    try {
      state = JSON.parse(reader.result); 
      save(); render(); buildTOC(); 
    } catch(err) { alert("有効なJSONファイルではありません。"); }
  };
  reader.readAsText(e.target.files[0]);
};

async function exportExcel(){
  if(typeof XLSX === 'undefined') { alert("ライブラリ読込中..."); return; }
  const data = [];
  chapters.forEach(ch => { 
    ch.items.forEach((itemText, i) => {
      const k = idFor(ch.id, i);
      data.push({"章":ch.title, "項目":itemText, "状況":state[k]?.checked?"完了":"", "メモ":state[k]?.memo||""});
    });
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const blob = new Blob([wbout], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const f = new File([blob], "life-check.xlsx", {type:blob.type});

  if(navigator.share && /iPhone|iPad|Android/i.test(navigator.userAgent)){
    try{ await navigator.share({files:[f], title:"エクセル出力"}); }catch(e){
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = f.name; a.click();
    }
  } else {
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = f.name; a.click();
  }
}

function importExcel(){ document.getElementById("excelFile").click(); }
document.getElementById("excelFile").onchange = (e) => {
  const reader = new FileReader();
  reader.onload = (evt) => {
    const wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    rows.forEach(r => { 
      chapters.forEach(ch => { 
        ch.items.forEach((it, i) => {
          if(it === (r.項目 || r.チェック項目)) {
            state[idFor(ch.id, i)] = {checked: (r.状況 === "完了"), memo: r.メモ || ""};
          }
        });
      });
    });
    save(); render(); buildTOC(); alert("Excelを読み込みました");
  };
  reader.readAsArrayBuffer(e.target.files[0]);
}

function toggleFilter(){ filterMode = !filterMode; render(); }

render();
buildTOC();
</script>
</body>
</html>
