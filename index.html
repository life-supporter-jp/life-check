async function downloadBackup() {

  const blob = new Blob([dataStr], { type: "application/json" });
  const fileName = "life-check.json";

  if (navigator.share && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    try {
      const file = new File([blob], fileName, { type: "application/json" });
      document.getElementById('saveGuide').style.display = 'block';
      await navigator.share({ files: [file], title: 'ライフチェック保存' });
    } catch (e) {}
    setTimeout(() => { document.getElementById('saveGuide').style.display = 'none'; }, 3000);
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

async function exportExcel() {
  const data = [];
  chapters.forEach(ch => {
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      data.push({ "章": ch.title, "項目": it, "完了": state[key]?.checked ? "〇" : "", "メモ": state[key]?.memo || "" });
    });
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "CheckList");
  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const fileName = "life-check.xlsx";

  if (navigator.share && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    try {
      const file = new File([blob], fileName, { type: blob.type });
      await navigator.share({ files: [file], title: 'ライフチェックExcel' });
    } catch (e) {}
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
  }
}

function loadJSON(){ document.getElementById("jsonFile").click(); }
document.getElementById("jsonFile").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      state = JSON.parse(reader.result);
      save(); render(); buildTOC(); alert("読み込み成功。");
    } catch(err) { alert("無効なファイルです。"); }
  };
  reader.readAsText(file);
};

function importExcel(){ document.getElementById("excelFile").click(); }
document.getElementById("excelFile").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(evt.target.result, {type:"binary"});
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      data.forEach(row => {
        chapters.forEach(ch => {
          ch.items.forEach((it, i) => {
            if(it === row.項目) state[idFor(ch.id, i)] = { checked: row.完了 === "〇", memo: row.メモ || "" };
          });
        });
      });
      save(); render(); buildTOC(); alert("Excel読込成功。");
    } catch(err) { alert("Excel読込失敗。"); }
  };
  reader.readAsBinaryString(file);
}

// --- 描画処理 ---
function render(){
  const c = document.getElementById("contentArea");
  const scroll = c.scrollTop;
  c.innerHTML = "";
  chapters.forEach(ch => {
    const title = document.createElement("div");
    title.className = "chapter-title";
    title.textContent = ch.title;
    c.appendChild(title);
    
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      if(!state[key]) state[key] = {};
      if(filterMode && state[key].checked) return;
      
      const div = document.createElement("div");
      div.className = "item" + (state[key].checked?" checked":"");
      div.innerHTML = `
        <label><input type="checkbox" ${state[key].checked?"checked":""}> <b>${it}</b></label>
        <div class="desc-toggle">▼ 解説を読む</div>
        <div class="desc">${DESC[key] || "（この項目の具体的なポイントを整理しましょう）"}</div>
        <textarea placeholder="メモを入力...">${state[key].memo || ""}</textarea>
      `;
      
      const cb = div.querySelector("input");
      const ta = div.querySelector("textarea");
      cb.onchange = () => { state[key].checked = cb.checked; save(); render(); buildTOC(); };
      ta.oninput = () => { state[key].memo = ta.value; save(); buildTOC(); };
      div.querySelector(".desc-toggle").onclick = () => {
        const d = div.querySelector(".desc");
        d.style.display = (d.style.display === "block") ? "none" : "block";
      };
      c.appendChild(div);
    });
  });
  c.scrollTop = scroll;
}

function buildTOC(){
  const toc = document.getElementById("tocList");
  toc.innerHTML = "";
  chapters.forEach(ch => {
    const li = document.createElement("li");
    let done = 0;
    ch.items.forEach((it, i) => { if(state[idFor(ch.id, i)]?.checked) done++; });
    const percent = Math.round(done / ch.items.length * 100);
    
    const a = document.createElement("a");
    a.innerHTML = `${ch.title} <span style="color:red">●</span> ${percent}%`;
    a.onclick = () => li.classList.toggle("active");
    li.appendChild(a);
    
    const sub = document.createElement("ul");
    ch.items.forEach(it => {
      const sli = document.createElement("li");
      sli.innerHTML = `<span style="font-size:14px; color:#666;">- ${it}</span>`;
      sub.appendChild(sli);
    });
    li.appendChild(sub);
    toc.appendChild(li);
  });
}

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function toggleFilter(){ filterMode = !filterMode; render(); }

// 初期化
state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
render(); buildTOC();
</script>
