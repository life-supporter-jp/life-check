<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マイライフチェック（保存機能強化版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root { --accent:#2b6cb0; }
* { box-sizing: border-box; }

body {
  font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
  margin: 0; padding: 0; font-size: 18px; color: #333; background-color: #f0f2f5;
}

.wrap { 
  max-width: 800px; margin: 0 auto; background-color: #fff; min-height: 100vh;
  padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

@media (max-width: 800px) { .wrap { max-width: 100%; padding: 10px; } }

.banner-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 8px; }

/* スマホ用保存案内 */
.save-guide { 
  display: none; background: #fff5f5; border: 2px solid #e53e3e; 
  padding: 15px; border-radius: 10px; margin: 10px 0; text-align: center; 
  font-weight: bold; color: #c53030; font-size: 16px;
}

/* 操作ボタン */
.controls { 
  margin: 20px 0; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; 
  position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,0.95); 
  padding: 10px 0; border-bottom: 2px solid #eee; 
}
button { 
  padding: 12px 8px; background: var(--accent); color: #fff; border: none; 
  border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1 1 140px; 
  font-size: 14px; min-width: 120px;
}

/* 目次エリア */
nav.toc {
  border: 1px solid #eee; padding: 12px; border-radius: 8px; background: #fafafa;
  max-height: 350px; overflow-y: auto; margin-bottom: 20px;
}
nav.toc ul { list-style: none; padding-left: 0; margin: 0; }
nav.toc li > a { 
  cursor: pointer; text-decoration: none; color: var(--accent); display: block; 
  padding: 10px 0; font-weight: bold; border-bottom: 1px solid #eee; 
}
nav.toc ul ul { display: none; padding-left: 15px; border-top: 1px dashed #ddd; }
nav.toc li.active > ul { display: block; }

/* 本文エリア */
.content {
  border: 2px solid #e2e8f0; padding: 0 15px; border-radius: 8px; background: #fff;
  height: 550px; overflow-y: scroll; -webkit-overflow-scrolling: touch; position: relative;
}

.chapter-title { 
  font-size: 18px; font-weight: bold; margin: 20px 0 10px; border-left: 6px solid var(--accent);
  padding: 5px 12px; background: #f0f4f8; position: sticky; top: 0; z-index: 5;
}

.item { padding: 15px 0; border-bottom: 1px solid #eee; }
.item.checked { background: #e6ffe6; border-left: 4px solid #4caf50; padding-left: 10px; }

.desc { 
  display: none; background: #f9f9f9; padding: 12px; margin-top: 8px; 
  border-radius: 4px; border: 1px dotted #ccc; font-size: 15px; line-height: 1.6;
}
.desc-toggle { 
  color: #0056b3; cursor: pointer; font-size: 14px; text-decoration: underline; 
  margin: 5px 0; display: inline-block; 
}

textarea { 
  width: 100%; min-height: 80px; margin-top: 10px; border: 1px solid #ccc; 
  border-radius: 4px; padding: 8px; font-size: 16px; font-family: inherit;
}

.footer-info { margin-top: 40px; padding: 20px; background: #f8f9fa; border-radius: 8px; }

@media print { .controls, nav.toc, .desc-toggle, .save-guide { display: none !important; } .content { height: auto; overflow: visible; } }
</style>
</head>
<body>

<div class="wrap">

let state = {};
let filterMode = false;
const STORAGE_KEY = "life-check-final-plus";

function idFor(chId, i){ return "ch" + chId + "-" + i; }

// --- スマホ対応保存 (JSON) ---
async function downloadBackup() {
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });
  const fileName = "my_life_data.json";

  if (navigator.share && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    try {
      const file = new File([blob], fileName, { type: "application/json" });
      document.getElementById('saveGuide').style.display = 'block';
      await navigator.share({ files: [file], title: 'ライフチェック保存データ' });
    } catch (e) {
      console.log("Cancelled");
    } finally {
      setTimeout(() => { document.getElementById('saveGuide').style.display = 'none'; }, 5000);
    }
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

// --- スマホ対応保存 (Excel) ---
async function exportExcel() {
  const data = [];
  chapters.forEach(ch => {
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      data.push({ "章": ch.title, "項目": it, "完了": state[key]?.checked ? "〇" : "", "メモ": state[key]?.memo || "" });
    });
  });

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "CheckList");
  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const fileName = "my_life_check.xlsx";

  if (navigator.share && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    try {
      const file = new File([blob], fileName, { type: blob.type });
      await navigator.share({ files: [file], title: 'ライフチェックExcel出力' });
    } catch (e) {
      console.log("Excel share error");
    }
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
  }
}

// --- 読込機能 ---
function loadJSON(){ document.getElementById("jsonFile").click(); }
document.getElementById("jsonFile").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      state = JSON.parse(reader.result);
      saveToLocal(); render(); buildTOC(); alert("読み込みました。");
    } catch(err) { alert("無効なファイル形式です。"); }
  };
  reader.readAsText(file);
};

function importExcel(){ document.getElementById("excelFile").click(); }
document.getElementById("excelFile").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(evt.target.result, {type:"binary"});
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      data.forEach(row => {
        chapters.forEach(ch => {
          ch.items.forEach((it, i) => {
            if(it === row.項目) state[idFor(ch.id, i)] = { checked: row.完了 === "〇", memo: row.メモ || "" };
          });
        });
      });
      saveToLocal(); render(); buildTOC(); alert("Excelからデータを復元しました。");
    } catch(e) { alert("Excelの読み込みに失敗しました。形式を確認してください。"); }
  };
  reader.readAsBinaryString(file);
};

// --- 画面描画 ---
function render(){
  const c = document.getElementById("contentArea");
  const scrollTop = c.scrollTop; 
  c.innerHTML = "";
  chapters.forEach(ch => {
    const title = document.createElement("div");
    title.className = "chapter-title";
    title.textContent = ch.title;
    c.appendChild(title);
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      if(!state[key]) state[key] = {};
      if(filterMode && state[key].checked) return;
      
      const div = document.createElement("div");
      div.className = "item" + (state[key].checked?" checked":"");
      div.innerHTML = `
        <label><input type="checkbox" ${state[key].checked?"checked":""}> <b>${it}</b></label>
        <div class="desc-toggle">▼ 解説を読む</div>
        <div class="desc">${DESC[key] || "（解説準備中...）"}</div>
        <textarea placeholder="ここにメモを入力...">${state[key].memo || ""}</textarea>
      `;
      const cb = div.querySelector("input");
      const ta = div.querySelector("textarea");
      cb.onchange = () => { state[key].checked = cb.checked; saveToLocal(); render(); buildTOC(); };
      ta.oninput = () => { state[key].memo = ta.value; saveToLocal(); buildTOC(); };
      div.querySelector(".desc-toggle").onclick = () => {
        const d = div.querySelector(".desc");
        d.style.display = (d.style.display === "block") ? "none" : "block";
      };
      c.appendChild(div);
    });
  });
  c.scrollTop = scrollTop;
}

function buildTOC(){
  const toc = document.getElementById("tocList");
  toc.innerHTML = "";
  chapters.forEach(ch => {
    const li = document.createElement("li");
    let done = 0;
    ch.items.forEach((it, i) => { if(state[idFor(ch.id, i)]?.checked) done++; });
    const percent = Math.round(done / ch.items.length * 100);

    const a = document.createElement("a");
    a.innerHTML = `${ch.title} <span style="color:#e53e3e">●</span> ${percent}%`;
    a.onclick = () => li.classList.toggle("active");
    li.appendChild(a);
    
    const sub = document.createElement("ul");
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      const sli = document.createElement("li");
      sli.innerHTML = `<span style="font-size:14px; color:#666;">- ${it} ${state[key]?.memo ? "📝" : ""}</span>`;
      sub.appendChild(sli);
    });
    li.appendChild(sub);
    toc.appendChild(li);
  });
}

function saveToLocal(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function toggleFilter(){ filterMode = !filterMode; render(); }

// 初期起動
state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
render(); buildTOC();
</script>
</body>
