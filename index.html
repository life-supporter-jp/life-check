<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終活チェックリスト</title>
<style>
  :root { --accent:#2b6cb0; }
  body { font-family: "Hiragino Kaku Gothic ProN", sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
  .wrap { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  h2 { text-align: center; color: var(--accent); }
  .item { border-bottom: 2px solid #eee; padding: 15px 0; }
  textarea { width: 100%; height: 100px; margin-top: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; padding: 8px; }
  
  /* ボタンのデザイン */
  .btn-save { background: #e53e3e; color: white; padding: 20px; width: 100%; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
  .btn-load { background: #718096; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; margin-top: 10px; font-size: 16px; cursor: pointer; }
  
  /* 保存確認エリア */
  .confirm-box { display: none; background: #fff5f5; border: 3px solid #e53e3e; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
  .file-name-display { font-size: 22px; font-weight: bold; background: #eee; display: inline-block; padding: 5px 15px; border-radius: 5px; margin: 10px 0; color: #000; }
</style>
</head>
<body>

<div class="wrap">
  <h2>マイライフチェック</h2>

  <div id="checklist">
    <div class="item">
      <input type="checkbox" id="check1" style="transform: scale(1.5);"> 
      <label for="check1" style="font-size: 18px; font-weight: bold; margin-left: 10px;">銀行口座の整理</label>
      <textarea id="memo1" placeholder="メモを入力してください"></textarea>
    </div>
  </div>

  <button id="step1Btn" class="btn-save" onclick="startSave()">今の内容を保存する</button>

  <div id="step2Area" class="confirm-box">
    <p style="font-weight: bold; margin: 0;">以下の名前で保存します</p>
    <div class="file-name-display">life-check.json</div>
    
    <button class="btn-save" style="margin-top:0;" onclick="executeDownload()">この名前で保存を確定</button>
    
    <button onclick="cancelSave()" style="background:none; border:none; color:blue; text-decoration:underline; margin-top:10px; display:block; width:100%;">戻る</button>
  </div>

  <button id="loadBtn" class="btn-load" onclick="document.getElementById('fileInput').click()">保存したデータを開く</button>
  <input type="file" id="fileInput" style="display:none" onchange="loadData(event)">

  <div style="margin-top:20px; font-size:14px; background:#eef; padding:15px; border-radius:10px;">
    <b>【iPhoneをお使いの方へ】</b><br>
    「確定」を押した後に画面の下に<b>「"life-check.json"をダウンロードしますか？」</b>と出たら、成功です。「ダウンロード」をタップしてください。
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem("life-check-final") || "{}");

function startSave() {
  document.getElementById('step2Area').style.display = 'block';
  document.getElementById('step1Btn').style.display = 'none';
  document.getElementById('loadBtn').style.display = 'none';
}

function cancelSave() {
  document.getElementById('step2Area').style.display = 'none';
  document.getElementById('step1Btn').style.display = 'block';
  document.getElementById('loadBtn').style.display = 'block';
}

function executeDownload() {
  // 1. 現在の入力をまとめる
  state = {
    c1: document.getElementById('check1').checked,
    m1: document.getElementById('memo1').value,
    date: new Date().toLocaleString()
  };

  const json = JSON.stringify(state, null, 2);
  
  // 2. iPhoneが「保存」と認識しやすいBlob形式を作成
  const blob = new Blob([json], { type: "application/octet-stream" });
  const url = URL.createObjectURL(blob);
  
  // 3. 一時的なリンクを作ってクリック
  const a = document.createElement("a");
  a.href = url;
  a.download = "life-check.json";
  
  // iPhone Safariでポップアップを出すための「おまじない」
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  
  // 4. 後片付け
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert("保存の案内を出しました。\n画面下の案内から保存を完了してください。");
    cancelSave();
  }, 500);
}

function loadData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    state = JSON.parse(ev.target.result);
    document.getElementById('check1').checked = state.c1;
    document.getElementById('memo1').value = state.m1;
    alert("データを読み込みました。");
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
