// --- 膨大な解説文データ ---
const DESC = {
"ch1-0": "銀行口座の一覧を作成することは、終活における基本中の基本です。自分がどの金融機関にどのような口座を持っているのかを正確に把握していないと、万が一の際に家族が資産を見つけられず、結果として休眠口座になってしまう可能性があります。まずは銀行名、支店名、口座種別、口座番号を一覧にまとめましょう。",
"ch1-1": "預金通帳やキャッシュカードの整理は、実際の手続きのしやすさに直結する重要な作業です。いくら口座一覧を作成していても、通帳やカードの所在が不明では手続きに時間がかかり、家族の負担が増えてしまいます。まずはすべての通帳とカードを一か所に集め、銀行ごとに分けて保管するようにしましょう。",
"ch1-2": "年金の受給手続きは、老後の生活を支える重要な収入源であるため、事前にしっかりと確認しておく必要があります。まずは、自分がどの年金制度に加入しているのかを把握し、受給開始年齢や受給額の見込みを確認しましょう。",
"ch1-3": "保険契約の整理は、万が一の際に確実に保険金を受け取るために非常に重要です。まず、自分が加入しているすべての保険を洗い出し、保険会社名、契約番号、保障内容、保険金額、受取人を一覧にまとめましょう。",
"ch1-4": "株式や投資信託、不動産などの資産は、現金と違って見えにくいため、しっかりと情報を整理しておく必要があります。証券会社の口座情報やログイン情報、保有銘柄、評価額などを一覧にしておくことで、家族が資産状況を把握しやすくなります。",
"ch1-5": "借金やローンの情報は、資産と同じくらい重要な情報です。住宅ローンや自動車ローン、カードローンなど、すべての借入先、残高、返済期間、毎月の返済額を一覧にまとめましょう。",
"ch1-6": "公共料金やサブスクリプションサービスの自動引き落としは、見逃されがちですが重要な整理項目です。電気、ガス、水道、通信費、動画配信サービスなど、毎月どのような支払いが発生しているのかを一覧にまとめましょう。",
"ch1-7": "財産目録の作成は、終活において非常に重要な作業の一つです。自分が保有しているすべての資産と負債を一覧にまとめることで、全体像を把握することができます。",
"ch1-8": "相続税の試算を行うことは、将来のトラブルを防ぐために非常に重要です。自分の財産がどの程度あり、どのくらいの税金が発生するのかを把握しておくことで、事前に対策を講じることができます。",
"ch1-9": "遺産分割の希望を事前に整理しておくことは、家族間のトラブルを防ぐために非常に重要です。誰にどの財産をどのように分けたいのか、自分の意思を明確にしておくことで、相続時の混乱を防ぐことができます。",
"ch2-0": "介護が必要になった場合にどのような生活を望むかを事前に明確にしておくことは、本人の尊厳を守るうえで非常に重要です。自宅での介護を希望するのか、施設への入所を希望するのかによって、準備すべき内容や費用が大きく変わります。",
"ch2-1": "介護施設は種類やサービス内容が多岐にわたるため、事前に候補をリストアップしておくことが重要です。特別養護老人ホーム、有料老人ホーム、サービス付き高齢者向け住宅など、それぞれの特徴や費用を理解しましょう。",
"ch2-2": "介護保険サービスは、高齢期の生活を支える重要な制度です。仕組みや利用方法を理解していないと、必要なサービスを十分に活用できない可能性があります。",
"ch2-3": "見守りサービスや生活支援サービスは、一人暮らしや高齢者世帯にとって大きな安心材料となります。緊急時に対応してくれるサービスを事前に登録しておきましょう。",
"ch2-4": "日常生活の中で負担となる家事や買い物について、事前に支援体制を整えておくことは重要です。無理をせず、早めに外部の支援を取り入れましょう。",
"ch2-5": "緊急時に迅速に対応するためには、連絡先の一覧を整備しておくことが不可欠です。家族や親族だけでなく、かかりつけ医などのリストも用意しましょう。",
"ch2-6": "入院や施設入所の際には、身元保証人が必要となるケースが多くあります。事前に誰が保証人になるのかを決めておくとスムーズです。",
"ch2-7": "介護には長期間にわたる費用がかかるため、事前に試算しておくことが重要です。公的制度を活用しながら自己負担額を把握しましょう。",
"ch2-8": "介護は精神的・身体的に大きな負担がかかるため、支えてくれる人への感謝の気持ちを伝えておくことは大切です。手紙として残すと家族の支えになります。",
"ch2-9": "将来どこでどのように暮らすのかを考えておくことは、安心した生活を送るために重要です。バリアフリー化や立地条件も含め検討しましょう。",
"ch3-0": "かかりつけ医の情報を整理しておくことは、緊急時に非常に重要です。病院名、電話番号、担当医、診療科目を一覧にして家族と共有しましょう。",
"ch3-1": "持病や服薬の記録を残すことは、安全で適切な医療を受けるために欠かせません。お薬手帳と併せて、服用内容を一元管理しておきましょう。",
"ch3-2": "医療保険証や高齢者医療証をすぐに取り出せる場所に保管しましょう。保管場所は家族にも伝えておく必要があります。",
"ch3-3": "延命治療に関する意思表示は、自分の最期をどう迎えたいかに関わる重要事項です。リビングウィルを作成し、家族と話し合っておきましょう。",
"ch3-4": "臓器提供の意思表示は、免許証やドナーカードで行えます。本人の意思を尊重してもらえるよう家族に伝えておくのがベストです。",
"ch3-5": "入院セットを事前に準備しておくと、急な事態でも慌てずに済みます。保険証、衣類、洗面用具などをまとめておきましょう。",
"ch3-6": "認知症に備え、成年後見制度や家族信託を検討しましょう。判断能力があるうちに準備することが大切です。",
"ch3-7": "緊急医療情報カードを財布などに入れておくと、救急隊員が迅速に状況を把握でき、適切な処置に繋がります。",
"ch3-8": "健康診断の結果を時系列で整理しておくと、医師に正確な経過を伝えることができ、より良い診断に役立ちます。",
"ch3-9": "在宅医療が必要になった際の地域の体制を調べておきましょう。訪問診療などの選択肢を知っておくと安心です。",
"ch4-0": "エンディングノートは、自分の希望や感謝を自由に綴るものです。定期的に見直し、家族が分かりやすい場所に保管しましょう。",
"ch4-1": "家族や友人への感謝を言葉で残すことは、遺された人への最高の贈り物です。文章にすることで素直な想いが伝わります。",
"ch4-2": "思い出の写真を整理し、デジタルデータはバックアップと場所の共有を行いましょう。不要なものの処分も大切です。",
"ch4-3": "自分史や年表を作ることで、人生を肯定的に振り返ることができます。家族にとっても本人の歩みを知る貴重な資料になります。",
"ch4-4": "形見分けなど、大切な物の譲り先を明記しましょう。理由も添えておくと、家族も納得しやすくなります。",
"ch4-5": "デジタル遺品（SNSやクラウドデータ）の管理は現代の必須項目です。IDの整理や消去してほしいデータの指定を行いましょう。",
"ch4-6": "ペットの引き継ぎ先を決め、食事や癖などの情報を細かくメモしておきましょう。飼い主としての最後の責任です。",
"ch4-7": "葬儀や供養の形式に関わる宗教的希望を伝えましょう。家族が困らないよう明確な意向を残すのが親切です。",
"ch4-8": "終活の不安を一人で抱えず、専門家や家族に相談しましょう。話し合うことで解決策が見つかりやすくなります。",
"ch4-9": "趣味の道具や作品、知識の継承先を考えましょう。想いを次に繋げることで、自分の生きた証が残ります。",
"ch5-0": "家族葬や一般葬など、葬儀の規模と形式の希望を伝えましょう。費用の目安も併せて考えると家族が助かります。",
"ch5-1": "葬儀社の事前相談を利用し、見積もりを取っておくと安心です。スタッフの対応も判断材料になります。",
"ch5-2": "お墓をどうするか（新設、継承、永代供養など）を決めましょう。管理の負担を考慮した選択が近年増えています。",
"ch5-3": "納骨堂や樹木葬といった新しい供養の形も検討しましょう。自分の価値観に合った場所を選ぶのが一番です。",
"ch5-4": "戒名や法名についての希望（必要か、どんな名前が良いか）を記しておきましょう。宗派との相談も必要です。",
"ch5-5": "葬儀で流してほしい曲や飾ってほしい花など、自分らしい演出の希望をメモしておきましょう。",
"ch5-6": "遺影写真は自分が気に入っているものを選んでおきましょう。デジタルデータなら加工もしやすく家族の負担も減ります。",
"ch5-7": "香典を辞退するか、受け取るかの意向を明記しましょう。葬儀の受付での混乱を防ぐことができます。",
"ch5-8": "亡くなった際に知らせてほしい人のリストを作っておきましょう。連絡先がないと家族は途方に暮れてしまいます。",
"ch5-9": "死後の手続き（役所、年金、保険など）は多岐にわたります。チェックリストを用意しておくと家族が迷わず動けます。",
"ch6-0": "スマホやPCのロック解除方法は、現代の終活で最も重要です。パスコードの保管場所などを信頼できる人に伝えましょう。",
"ch6-1": "ネットサービスのID/パスワードを一覧化しましょう。ただしセキュリティのため、ヒント形式にするなどの工夫も有効です。",
"ch6-2": "ネット銀行・証券は書類がないため、口座の存在自体を家族に知らせておかないと資産が放置されてしまいます。",
"ch6-3": "サブスクリプションの契約一覧を作りましょう。死後も課金が続かないよう、解約方法をメモしておくと親切です。",
"ch6-4": "SNSアカウントを削除するか、追悼アカウントとして残すか方針を決め、ログイン情報とともに託しましょう。",
"ch6-5": "クラウド上の写真データの引き継ぎ方法を整理しましょう。共有設定を活用すると家族がアクセスしやすくなります。",
"ch6-6": "キャッシュレス決済の残高も資産です。どのアプリを使っているか家族が把握できるようにしておきましょう。",
"ch6-7": "仮想通貨やNFTは秘密鍵を紛失すると二度と取り出せません。安全な形での管理と引き継ぎ準備が必要です。",
"ch6-8": "見られたくないデータは、死後に自動削除される仕組みや、あらかじめ整理しておくことでプライバシーを守りましょう。",
"ch6-9": "ネット上だけの友人の連絡先をまとめ、万が一の際に誰がどう伝えるかを考えておくと、関係を大切に終わらせられます。"
};

// --- ロジック ---
let state = JSON.parse(localStorage.getItem("s-check-full") || "{}");
let filterMode = false;

function idFor(chId, i) { return `ch${chId}-${i}`; }

function save() { localStorage.setItem("s-check-full", JSON.stringify(state)); }

function render() {
  const c = document.getElementById("contentArea");
  c.innerHTML = "";
  chapters.forEach(ch => {
    const title = document.createElement("div");
    title.className = "chapter-title";
    title.textContent = ch.title;
    c.appendChild(title);

    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      if (!state[key]) state[key] = { checked: false, memo: "" };
      if (filterMode && state[key].checked) return;

      const div = document.createElement("div");
      div.className = "item" + (state[key].checked ? " checked" : "") + (state[key].memo ? " has-memo" : "");
      div.id = key;
      div.innerHTML = `
        <div class="item-header">
          <input type="checkbox" id="cb-${key}" ${state[key].checked ? "checked" : ""}>
          <label for="cb-${key}">${it}</label>
        </div>
        <div class="desc-toggle">▼ 解説を読む</div>
        <div class="desc">${DESC[key] || "解説を準備中です。"}</div>
        <textarea placeholder="メモを入力...">${state[key].memo || ""}</textarea>
      `;

      div.querySelector("input").onchange = (e) => {
        state[key].checked = e.target.checked;
        save(); render(); buildTOC();
      };
      div.querySelector("textarea").oninput = (e) => {
        state[key].memo = e.target.value;
        save(); buildTOC();
        div.className = "item" + (state[key].checked ? " checked" : "") + (state[key].memo ? " has-memo" : "");
      };
      div.querySelector(".desc-toggle").onclick = () => {
        const d = div.querySelector(".desc");
        d.style.display = d.style.display === "block" ? "none" : "block";
      };
      c.appendChild(div);
    });
  });
}

function buildTOC() {
  const toc = document.getElementById("tocList");
  toc.innerHTML = "";
  chapters.forEach(ch => {
    const li = document.createElement("li");
    let done = 0;
    ch.items.forEach((_, i) => { if (state[idFor(ch.id, i)]?.checked) done++; });
    const percent = Math.round((done / ch.items.length) * 100);

    const a = document.createElement("a");
    a.href = "javascript:void(0)";
    a.innerHTML = `${ch.title} <span style="color:red">●</span> ${percent}%`;
    a.onclick = () => li.classList.toggle("active");
    li.appendChild(a);

    const sub = document.createElement("ul");
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      const subli = document.createElement("li");
      const sa = document.createElement("a");
      sa.href = "javascript:void(0)";
      sa.innerHTML = it + (state[key]?.memo ? " <span style='color:black'>●</span>" : "");
      sa.onclick = (e) => {
        e.stopPropagation();
        const target = document.getElementById(key);
        if(target) target.scrollIntoView({ behavior: "smooth", block: "center" });
      };
      subli.appendChild(sa);
      sub.appendChild(subli);
    });
    li.appendChild(sub);
    toc.appendChild(li);
  });
}

function toggleFilter() { filterMode = !filterMode; render(); }
function downloadBackup() {
  const blob = new Blob([JSON.stringify(state)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "shukatsu_backup.json"; a.click();
}
function loadJSON() { document.getElementById("jsonFile").click(); }
document.getElementById("jsonFile").onchange = (e) => {
  const reader = new FileReader();
  reader.onload = () => { state = JSON.parse(reader.result); save(); render(); buildTOC(); };
  reader.readAsText(e.target.files[0]);
};
function exportExcel() {
  const data = Object.keys(state).map(k => ({ 項目ID: k, 完了: state[k].checked ? "〇" : "", メモ: state[k].memo }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "CheckData");
  XLSX.writeFile(wb, "shukatsu_list.xlsx");
}
function importExcel() { document.getElementById("excelFile").click(); }
document.getElementById("excelFile").onchange = (e) => {
  const reader = new FileReader();
  reader.onload = (evt) => {
    const wb = XLSX.read(evt.target.result, { type: "binary" });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    rows.forEach(r => { if(r.項目ID) state[r.項目ID] = { checked: r.完了 === "〇", memo: r.メモ || "" }; });
    save(); render(); buildTOC();
  };
  reader.readAsBinaryString(e.target.files[0]);
};

// 起動
render();
buildTOC();
</script>
