<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>終活チェックリスト（動作改善版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root { --accent:#2b6cb0; }
* { box-sizing: border-box; }
body{ font-family:sans-serif; margin:0; padding:0; background:#f0f2f5; font-size:16px; }
.wrap{ max-width:800px; margin:0 auto; background:#fff; padding:15px; min-height:100vh; }
.banner-container img { max-width:100%; height:auto; border-radius:8px; display:block; margin:0 auto; }

/* レイアウト */
.main { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
nav.toc { border: 2px solid var(--accent); border-radius: 8px; padding: 10px; background: #fafafa; }
nav.toc ul { list-style: none; padding: 0; margin: 0; }
nav.toc li { border-bottom: 1px solid #eee; }
nav.toc li a { display: block; padding: 12px; color: var(--accent); font-weight: bold; text-decoration: none; cursor: pointer; }
nav.toc ul ul { display: none; padding-left: 15px; background: #fff; }
nav.toc li.active ul { display: block; }

.content { border: 2px solid #e2e8f0; border-radius: 8px; height: 500px; overflow-y: scroll; padding: 10px; }
.chapter-title { background: #f0f4f8; padding: 8px; font-weight: bold; position: sticky; top: 0; border-left: 5px solid var(--accent); margin: 15px 0 10px; }

/* アイテム */
.item { padding: 15px 5px; border-bottom: 1px solid #eee; }
.item.checked { background: #e6ffe6; }
textarea { width: 100%; height: 80px; margin-top: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
.desc { display: none; background: #f9f9f9; padding: 10px; border: 1px dotted #ccc; margin-top: 5px; font-size: 14px; }
.desc-toggle { color: blue; cursor: pointer; text-decoration: underline; font-size: 13px; }

/* ボタン */
.controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }
button { padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; min-width: 120px; }

/* ポップアップ */
#qr-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
.qr-window { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 20px; border-radius: 10px; text-align: center; }
</style>
</head>
<body>

<div class="wrap">
    <div class="banner-container">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg">
    </div>

    <div class="main">
        <nav class="toc">
            <p style="font-weight:bold; margin:0 0 10px;">【目次：章をタップで開く】</p>
            <ul id="tocList"></ul>
        </nav>
        
        <div class="content" id="contentArea"></div>
    </div>

    <div class="controls">
        <button onclick="toggleFilter()" style="background:#555;">未完了のみ切替</button>
        <button onclick="downloadBackup()">ファイル保存</button>
        <button onclick="document.getElementById('jsonFile').click()" style="background:#718096;">ファイル読込</button>
        <button onclick="exportExcel()" style="background:#2f855a;">Excel出力</button>
        <button onclick="showQR()" style="background:#e53e3e;">QR表示</button>
        <button onclick="window.print()" style="background:#1a202c;">印刷</button>
    </div>

    <div id="qr-overlay" onclick="closeQR()">
        <div class="qr-window" onclick="event.stopPropagation()">
            <p>スマホ等で読み取ってください</p>
            <div id="qrcode" style="margin:15px auto; display:inline-block;"></div><br>
            <button onclick="closeQR()">閉じる</button>
        </div>
    </div>

    <input type="file" id="jsonFile" style="display:none" onchange="loadJSON(event)">
    
    <div class="footer-info" style="margin-top:30px;">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg" style="width:100%;">
    </div>
</div>

<script>
// --- データ定義 ---
const chapters = [
    { id:1, title:"第1章 お金と財産管理", items:["銀行口座の一覧","通帳・カード整理","年金手続き","保険契約","株式・不動産","借金・ローン","公共料金","財産目録","相続税試算","遺産分割"]},
    { id:2, title:"第2章 介護・生活サポート", items:["介護の希望","施設候補","介護保険","見守りサービス","家事支援","緊急連絡網","身元保証人","介護費用","感謝の手紙","住まいの決定"]}
];

const STORAGE_KEY = "shukatsu_v3_data";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let filterMode = false;

// --- 表示機能 ---
function render() {
    const container = document.getElementById("contentArea");
    container.innerHTML = "";
    chapters.forEach(ch => {
        const h = document.createElement("div");
        h.className = "chapter-title";
        h.textContent = ch.title;
        container.appendChild(h);

        ch.items.forEach((item, i) => {
            const key = `ch${ch.id}-${i}`;
            if (!state[key]) state[key] = { checked: false, memo: "" };
            if (filterMode && state[key].checked) return;

            const div = document.createElement("div");
            div.className = "item" + (state[key].checked ? " checked" : "");
            div.id = key;
            div.innerHTML = `
                <label style="display:block; cursor:pointer;">
                    <input type="checkbox" ${state[key].checked ? "checked" : ""} onchange="updateCheck('${key}', this.checked)">
                    <b>${item}</b>
                </label>
                <div class="desc-toggle" onclick="toggleDesc('${key}')">▼ 解説を見る</div>
                <div class="desc" id="desc-${key}">ここに解説文が入ります。</div>
                <textarea oninput="updateMemo('${key}', this.value)" placeholder="メモを入力...">${state[key].memo}</textarea>
            `;
            container.appendChild(div);
        });
    });
}

function buildTOC() {
    const list = document.getElementById("tocList");
    list.innerHTML = "";
    chapters.forEach(ch => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = ch.title;
        a.onclick = () => {
            li.classList.toggle("active");
        };
        li.appendChild(a);

        const sub = document.createElement("ul");
        ch.items.forEach((item, i) => {
            const key = `ch${ch.id}-${i}`;
            const subLi = document.createElement("li");
            subLi.innerHTML = `<a onclick="document.getElementById('${key}').scrollIntoView({behavior:'smooth'})">${item}</a>`;
            sub.appendChild(subLi);
        });
        li.appendChild(sub);
        list.appendChild(li);
    });
}

// --- 操作機能 ---
function updateCheck(key, val) {
    state[key].checked = val;
    save();
    render();
}

function updateMemo(key, val) {
    state[key].memo = val;
    save();
}

function toggleDesc(key) {
    const d = document.getElementById("desc-" + key);
    d.style.display = (d.style.display === "block") ? "none" : "block";
}

function toggleFilter() {
    filterMode = !filterMode;
    render();
}

function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// --- 保存・出力 ---
function downloadBackup() {
    const blob = new Blob([JSON.stringify(state)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "shukatsu_data.json";
    a.click();
}

function loadJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            state = JSON.parse(e.target.result);
            save();
            render();
            buildTOC();
            alert("データを読み込みました");
        } catch (err) {
            alert("ファイルの形式が正しくありません");
        }
    };
    reader.readAsText(file);
}

function exportExcel() {
    const rows = [];
    for (let key in state) {
        rows.push({ "項目ID": key, "完了": state[key].checked ? "〇" : "", "メモ": state[key].memo });
    }
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "終活データ");
    XLSX.writeFile(wb, "shukatsu_list.xlsx");
}

function showQR() {
    document.getElementById("qrcode").innerHTML = "";
    try {
        new QRCode(document.getElementById("qrcode"), {
            text: JSON.stringify(state),
            width: 200,
            height: 200
        });
        document.getElementById("qr-overlay").style.display = "block";
    } catch (e) {
        alert("QRコード作成に失敗しました。ネット接続を確認してください。");
    }
}

function closeQR() {
    document.getElementById("qr-overlay").style.display = "none";
}

// 初期起動
render();
buildTOC();
</script>
</body>
</html>
