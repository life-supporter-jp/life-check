<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終活チェックリスト</title>
<style>
  :root { --accent:#2b6cb0; }
  body { font-family: "Hiragino Kaku Gothic ProN", sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
  .wrap { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  h2 { text-align: center; color: var(--accent); }
  .item { border-bottom: 2px solid #eee; padding: 15px 0; }
  textarea { width: 100%; height: 100px; margin-top: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; padding: 8px; }
  
  .btn-save { background: #e53e3e; color: white; padding: 20px; width: 100%; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 20px; }
  .btn-load { background: #718096; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; margin-top: 15px; font-size: 16px; cursor: pointer; }
  
  .confirm-box { display: none; background: #fff5f5; border: 3px solid #e53e3e; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<div class="wrap">
  <h2>マイライフチェック</h2>

  <div id="checklist">
    <div class="item">
      <input type="checkbox" id="check1" style="transform: scale(2.0); margin-right: 15px;"> 
      <label for="check1" style="font-size: 20px; font-weight: bold;">銀行口座の整理</label>
      <textarea id="memo1" placeholder="メモを入力してください"></textarea>
    </div>
  </div>

  <button id="startBtn" class="btn-save" onclick="openConfirm()">内容を保存する</button>

  <div id="confirmArea" class="confirm-box">
    <p style="font-weight: bold; font-size: 20px; margin-top: 0;">保存の最終確認</p>
    <p>ファイル名：<b style="font-size: 22px;">life-check.json</b></p>
    
    <a id="downloadLink" download="life-check.json" class="btn-save" 
       style="display: block; text-decoration: none; margin-top: 0;" 
       onclick="prepareData()">この名前で保存を確定</a>
    
    <button onclick="closeConfirm()" style="background:none; border:none; color:blue; text-decoration:underline; margin-top:20px; display:block; width:100%; font-size: 18px;">戻る</button>
  </div>

  <button id="loadBtn" class="btn-load" onclick="document.getElementById('fileIn').click()">保存したデータを開く</button>
  <input type="file" id="fileIn" style="display:none" onchange="loadData(event)">
</div>

<script>
// ローカル保存用
const SAVE_KEY = "life-check-v6";
let state = JSON.parse(localStorage.getItem(SAVE_KEY) || "{}");

function openConfirm() {
    // ボタンが押された瞬間に中身を最新にする
    updateLink();
    document.getElementById('confirmArea').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('loadBtn').style.display = 'none';
}

function closeConfirm() {
    document.getElementById('confirmArea').style.display = 'none';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('loadBtn').style.display = 'block';
}

// データの塊を「確定ボタン」に事前にセットしておく
function updateLink() {
    const currentState = {
        c1: document.getElementById('check1').checked,
        m1: document.getElementById('memo1').value,
        time: new Date().getTime()
    };
    const blob = new Blob([JSON.stringify(currentState)], { type: "application/octet-stream" });
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('downloadLink');
    link.href = url;
}

// 保存ボタンが押された瞬間に動く
function prepareData() {
    // 画面にメッセージを出す
    setTimeout(() => {
        alert("保存の命令を出しました。\n画面の下に『ダウンロード』と出たら、そこをタップしてください。");
        closeConfirm();
    }, 500);
}

function loadData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        state = JSON.parse(ev.target.result);
        document.getElementById('check1').checked = state.c1;
        document.getElementById('memo1').value = state.m1;
        alert("読み込みました。");
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
