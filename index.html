<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終活チェックリスト</title>
<style>
  :root { --accent:#2b6cb0; }
  body { font-family: "Hiragino Kaku Gothic ProN", sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
  .wrap { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  h2 { text-align: center; color: var(--accent); margin-bottom: 20px; }
  
  .item { border-bottom: 2px solid #eee; padding: 15px 0; }
  textarea { width: 100%; height: 100px; margin-top: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; }
  
  /* ボタンのデザイン：さらに大きく、押しやすく */
  .btn-save { background: #e53e3e; color: white; padding: 22px; width: 100%; border: none; border-radius: 15px; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #b91c1c; }
  .btn-save:active { transform: translateY(2px); box-shadow: 0 2px 0 #b91c1c; }
  .btn-load { background: #718096; color: white; padding: 18px; width: 100%; border: none; border-radius: 12px; margin-top: 20px; font-size: 18px; cursor: pointer; }
  
  /* 手順案内エリア */
  .guide-box { display: none; background: #fff5f5; border: 3px solid #e53e3e; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
  .step-text { font-size: 18px; font-weight: bold; color: #e53e3e; margin-bottom: 10px; line-height: 1.4; }
</style>
</head>
<body>

<div class="wrap">
  <h2>マイライフチェック</h2>

  <div id="checklist">
    <div class="item">
      <input type="checkbox" id="check1" style="transform: scale(2.0); margin-right: 15px;"> 
      <label for="check1" style="font-size: 20px; font-weight: bold;">銀行口座の整理</label>
      <textarea id="memo1" placeholder="メモを入力してください"></textarea>
    </div>
  </div>

  <div id="guideArea" class="guide-box">
    <p class="step-text">【重要】このあと画面の下に<br>メニューが出てきます</p>
    <p style="font-size: 16px; margin-bottom: 15px;">リストの中から<br><b>「"ファイル"に保存」</b><br>を選んで、右上の保存を押してください。</p>
  </div>

  <button class="btn-save" onclick="saveViaShare()">今の内容を保存する</button>

  <button class="btn-load" onclick="document.getElementById('fileIn').click()">保存したデータを開く</button>
  <input type="file" id="fileIn" style="display:none" onchange="loadData(event)">
</div>

<script>
// iPhoneで最も確実に「ファイル保存場所」を指定させる方法
async function saveViaShare() {
    // 1. 入力内容をまとめる
    const state = {
        c1: document.getElementById('check1').checked,
        m1: document.getElementById('memo1').value,
        date: new Date().toLocaleString()
    };
    
    const jsonStr = JSON.stringify(state, null, 2);
    const blob = new Blob([jsonStr], { type: "application/json" });
    
    // 2. iPhoneに「ファイル」として認識させる
    const file = new File([blob], "life-check.json", { type: "application/json" });

    // 案内の表示
    document.getElementById('guideArea').style.display = 'block';

    try {
        // 3. iPhone標準の「共有メニュー」を呼び出す
        if (navigator.share) {
            await navigator.share({
                files: [file],
                title: '終活データ保存',
                text: 'マイライフチェックの記録です'
            });
            // 共有が終わったら案内を隠す
            setTimeout(() => { document.getElementById('guideArea').style.display = 'none'; }, 2000);
        } else {
            alert("Safariブラウザで実行してください。");
        }
    } catch (err) {
        // キャンセル時は案内を隠す
        document.getElementById('guideArea').style.display = 'none';
        console.log("保存がキャンセルされました");
    }
}

function loadData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const loaded = JSON.parse(ev.target.result);
        document.getElementById('check1').checked = loaded.c1;
        document.getElementById('memo1').value = loaded.m1;
        alert("読み込みが完了しました。");
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
