<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マイライフチェック</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root { --accent:#2b6cb0; }
* { box-sizing: border-box; }
body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; margin: 0; padding: 0; font-size: 18px; color: #333; background-color: #f0f2f5; line-height: 1.6; }
.wrap { max-width: 800px; margin: 0 auto; background-color: #fff; min-height: 100vh; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
@media (max-width: 800px) { .wrap { max-width: 100%; padding: 10px; } }

/* 上部バナー画像 */
.banner-container { width: 100%; text-align: center; margin-bottom: 20px; }
.banner-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 8px; }

/* 目次表示 */
nav.toc { border: 1px solid #eee; padding: 12px; border-radius: 8px; background: #fafafa; max-height: 350px; overflow-y: auto; margin-bottom: 20px; }
nav.toc ul { list-style: none; padding-left: 0; margin: 0; }
nav.toc li > a { cursor: pointer; text-decoration: none; color: var(--accent); display: block; padding: 10px 0; font-weight: bold; border-bottom: 1px solid #eee; }
nav.toc ul ul { display: none; padding-left: 15px; }
nav.toc li.active > ul { display: block; }

/* チェックリスト本体：ボタンを下に置くため高さ制限を解除 */
.content { border: 2px solid #e2e8f0; padding: 10px; border-radius: 8px; background: #fff; margin-bottom: 20px; }
.chapter-title { font-size: 18px; font-weight: bold; margin: 30px 0 10px; border-left: 6px solid var(--accent); padding: 5px 12px; background: #f0f4f8; position: sticky; top: 0; z-index: 5; }
.item { padding: 15px 0; border-bottom: 1px solid #eee; }
.item.checked { background: #e6ffe6; border-left: 4px solid #4caf50; padding-left: 10px; }

/* 解説表示 */
.desc { display: none; background: #f9f9f9; padding: 12px; margin-top: 8px; border-radius: 4px; border: 1px dotted #ccc; font-size: 15px; }
.desc-toggle { color: #0056b3; cursor: pointer; font-size: 14px; text-decoration: underline; margin: 5px 0; display: inline-block; }

/* コメント（メモ）入力欄 */
textarea { width: 100%; min-height: 80px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; font-size: 16px; font-family: inherit; display: block; }

/* 操作ボタン：正確に6個を最下部に配置 */
.controls { margin: 40px 0; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 25px 0; border-top: 2px solid #eee; }
button { padding: 14px 10px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1 1 140px; font-size: 14px; min-width: 120px; }
button:active { opacity: 0.7; }

/* スマホ保存案内 */
.save-guide { display: none; background: #fff5f5; border: 2px solid #e53e3e; padding: 15px; border-radius: 10px; margin: 10px 0; text-align: center; font-weight: bold; color: #c53030; }

.footer-info { margin-top: 40px; padding: 20px; background: #f8f9fa; border-radius: 8px; font-size: 15px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="banner-container">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="Banner">
  </div>

  <div style="text-align: center;">
    <h2 style="margin: 10px 0;">マイライフチェック</h2>
  </div>

  <div class="main">
    <nav class="toc"><ul id="tocList"></ul></nav>
    <div class="content" id="contentArea"></div>
  </div>

  <div id="saveGuide" class="save-guide">
    【スマホの方】次の画面で「"ファイル"に保存」を選んでください
  </div>

  <div class="controls">
    <button onclick="toggleFilter()" style="background: #555;">未完了のみ</button>
    <button onclick="downloadBackup()">データ保存</button>
    <button onclick="loadJSON()" style="background: #718096;">データ読込</button>
    <button onclick="exportExcel()" style="background: #2f855a;">Excel出力</button>
    <button onclick="importExcel()" style="background: #2f855a;">Excel読込</button>
    <button onclick="window.print()" style="background: #1a202c;">印刷</button>
  </div>

  <div class="footer-info">
    <p><b>終活・ライフプランのご案内</b></p>
    <p>大事な記録をサーバーに残せるサイトや、脳トレゲームなどもご案内しています。</p>
    <a href="https://life-supporter.jp/lp/HRSuykFf" target="_blank">詳細はこちら（体験版サイト）</a>
  </div>

  <input type="file" id="jsonFile" style="display:none" accept=".json">
  <input type="file" id="excelFile" style="display:none" accept=".xlsx,.xls">
</div>

<script>
const chapters = [
  { id:1, title:"第1章 お金と財産管理", items:["銀行口座の一覧作成","預金通帳・カード整理","年金受給手続き確認","保険契約の整理","株式・不動産情報","借金・ローンの明記","公共料金・サブスク","財産目録の作成","相続税の試算","遺産分割の希望"]},
  { id:2, title:"第2章 介護・生活サポート", items:["介護の希望記録","介護施設候補リスト","介護保険サービス確認","見守り・支援登録","家事・買い物支援","緊急連絡網リスト","身元保証人の確保","介護費用の試算","感謝の手紙","将来の住まい決定"]},
  { id:3, title:"第3章 医療・健康管理", items:["かかりつけ医整理","持病・服薬記録","医療保険証の保管","延命治療の意思表示","臓器提供の意思","入院セット準備","成年後見の検討","緊急医療カード作成","健康診断記録整理","在宅医療体制確認"]},
  { id:4, title:"第4章 心・人生の整理", items:["エンディングノート","家族への感謝の言葉","写真・日記の整理","自分史・年表作成","大切な物の譲り先","デジタル遺品整理","ペットの世話依頼","宗教・信仰の希望","心の不安相談相手","趣味活動の後継者"]},
  { id:5, title:"第5章 葬儀・供養", items:["葬儀の規模決定","葬儀社の事前相談","お墓の準備決定","納骨・供養の収集","戒名・法名の希望","音楽・花の指定","遺影写真の準備","香典・供物の扱い","死後の連絡先リスト","死後の手続き一覧"]},
  { id:6, title:"第6章 デジタル遺産", items:["スマホ等のロック解除","ID・パスワード保管","ネット銀行・証券","サブスク解約リスト","SNSの死後対応","クラウド写真の整理","キャッシュレス決済","暗号資産・NFT","非公開データの処理","デジタル連絡先"]}
];

const DESC = {
  "ch1-0": "休眠口座を防ぐため、銀行名・支店名・口座番号を一覧にします。",
  "ch1-1": "紛失時に備え、保管場所を信頼できる家族に伝えておきます。",
  "ch1-2": "受給中の年金種類や基礎年金番号をメモしておきましょう。",
  "ch1-3": "証券番号と連絡先をまとめ、請求漏れを防ぎます。",
  "ch1-4": "不動産の権利証や固定資産税通知書の場所を確認します。",
  "ch1-5": "負の遺産も隠さず記録することが家族の負担を減らします。",
  "ch1-6": "死後に引き落としが続くのを防ぐためのリストです。",
  "ch1-7": "プラスとマイナスの財産をすべて書き出します。",
  "ch1-8": "相続税がかかるかどうか、事前の目安になります。",
  "ch1-9": "誰に何を継いでほしいか、家族間の争いを防ぐための意思表示です。",
  "ch2-0": "自宅か施設か、どのようなケアを受けたいかを記します。",
  "ch2-1": "希望に合う場所を絞り込み、見学などの検討材料にします。",
  "ch2-2": "要介護認定の申請方法などを事前に把握しておきましょう。",
  "ch2-3": "自治体や民間が提供する安心・安全なサービスを検討します。",
  "ch2-4": "シルバー人材センターなどの便利な窓口をメモします。",
  "ch2-5": "親族や友人、近所の方など、有事の際の連絡順を決めます。",
  "ch2-6": "身寄りがいない場合に備え、公的な支援や契約を確認します。",
  "ch2-7": "自己資金でどこまでのケアが可能か把握しておきましょう。",
  "ch2-8": "普段言えない感謝を文字にしておくことが、心の供養になります。",
  "ch2-9": "リフォームや住み替えなど、将来の快適な居場所を考えます。",
  "ch3-0": "現在の診断名や通院先、連絡先をリスト化します。",
  "ch3-1": "お薬手帳の場所を明確にし、アレルギー情報も記します。",
  "ch3-2": "急な入院時に家族が迷わず取り出せるようにします。",
  "ch3-3": "胃ろうや人工呼吸器など、最期の具体的な希望を明記します。",
  "ch3-4": "免許証やカードの意思表示欄を確認しておきましょう。",
  "ch3-5": "診察券、印鑑、着替えなど最低限のセットを作ります。",
  "ch3-6": "判断力が低下した時に備え、信頼できる人を決めます。",
  "ch3-7": "血液型や緊急連絡先を書いたカードを常に身につけます。",
  "ch3-8": "過去の病歴を知る手がかりとして整理しましょう。",
  "ch3-9": "最期を自宅で迎えたい場合、訪問診療などの体制を調べます。",
  "ch4-0": "全ての情報を一冊にまとめる、自分と家族のためのノートです。",
  "ch4-1": "ビデオメッセージや手紙など、形に残る言葉を準備します。",
  "ch4-2": "不要なものは処分し、残す写真はベストショットを厳選します。",
  "ch4-3": "歩んできた道を振り返ることで、今の生き方が明確になります。",
  "ch4-4": "形見分けなど、誰に何を譲るかリスト化します。",
  "ch4-5": "パソコン内のデータなど、死後の扱いを決めておきます。",
  "ch4-6": "自分が世話できなくなった後の預け先を確保します。",
  "ch4-7": "宗派や形式への希望、または無宗教などの意思を伝えます。",
  "ch4-8": "公的機関や専門家、友人の連絡先をまとめます。",
  "ch4-9": "コレクションや活動をどう引き継ぐか指定します。",
  "ch5-0": "家族のみか、知人を呼ぶか、規模と予算を考えます。",
  "ch5-1": "信頼できる葬儀社を選び、事前見積もりを取っておきましょう。",
  "ch5-2": "お墓の有無や、納骨場所についての希望を記します。",
  "ch5-3": "散骨や合祀墓など、新しい供養の形も検討します。",
  "ch5-4": "特定の宗派や、入れてほしい文字があれば記します。",
  "ch5-5": "好きな曲や、飾ってほしい花の種類を指定します。",
  "ch5-6": "自分らしい納得のいく写真を事前に選んでおきます。",
  "ch5-7": "辞退するか、受け取るか、本人の意向を明確にします。",
  "ch5-8": "死亡時にすぐに知らせてほしい人のリストを作ります。",
  "ch5-9": "年金停止や名義変更など、必要な手続きを把握します。",
  "ch6-0": "スマホのパスコードが不明だと、家族が非常に困ります。",
  "ch6-1": "紙のメモやエンディングノートの秘密欄に記載します。",
  "ch6-2": "通帳がないネット口座は存在を伝えないと見つかりません。",
  "ch6-3": "動画配信や課金アプリなど、停止が必要なものを列挙します。",
  "ch6-4": "アカウントの削除や、追悼ページへの移行を検討します。",
  "ch6-5": "思い出の写真を共有できるよう、保存先を伝えておきます。",
  "ch6-6": "PayPay等の残高も遺産になります。存在を明記しましょう。",
  "ch6-7": "ビットコイン等のウォレットキーは厳重に保管場所を指定します。",
  "ch6-8": "他人に見られたくないデータの処分方法を検討します。",
  "ch6-9": "ネット上の友人に訃報をどう伝えるか指定します。"
};

let state = {};
let filterMode = false;
const STORAGE_KEY = "life-check-v2026-v3";

function idFor(chId, i){ return "ch" + chId + "-" + i; }

// --- 保存・読込ロジック ---
async function downloadBackup() {
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: "application/json" });
  const fileName = "life-check.json";
  if (navigator.share && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    try {
      const file = new File([blob], fileName, { type: "application/json" });
      document.getElementById('saveGuide').style.display = 'block';
      await navigator.share({ files: [file], title: 'ライフチェック保存' });
    } catch (e) { console.log("Share API error"); }
    finally { setTimeout(() => { document.getElementById('saveGuide').style.display = 'none'; }, 3000); }
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
}

function exportExcel() {
  const data = [];
  chapters.forEach(ch => {
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      data.push({ "章": ch.title, "項目": it, "完了": state[key]?.checked ? "〇" : "", "メモ": state[key]?.memo || "" });
    });
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "CheckList");
  XLSX.writeFile(wb, "life-check.xlsx");
}

function loadJSON(){ document.getElementById("jsonFile").click(); }
document.getElementById("jsonFile").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { state = JSON.parse(reader.result); saveToLocal(); render(); buildTOC(); alert("読込完了"); }
    catch(err) { alert("形式エラー"); }
  };
  reader.readAsText(file);
};

function importExcel(){ document.getElementById("excelFile").click(); }
document.getElementById("excelFile").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(evt.target.result, {type:"binary"});
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      data.forEach(row => {
        chapters.forEach(ch => {
          ch.items.forEach((it, i) => {
            if(it === row.項目) state[idFor(ch.id, i)] = { checked: row.完了 === "〇", memo: row.メモ || "" };
          });
        });
      });
      saveToLocal(); render(); buildTOC(); alert("Excel読込完了");
    } catch(e) { alert("失敗しました"); }
  };
  reader.readAsBinaryString(file);
};

// --- 表示描画 ---
function render(){
  const c = document.getElementById("contentArea");
  c.innerHTML = "";
  chapters.forEach(ch => {
    const title = document.createElement("div");
    title.className = "chapter-title";
    title.textContent = ch.title;
    c.appendChild(title);
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      if(!state[key]) state[key] = { checked: false, memo: "" };
      if(filterMode && state[key].checked) return;
      
      const div = document.createElement("div");
      div.className = "item" + (state[key].checked?" checked":"");
      div.innerHTML = `
        <label><input type="checkbox" ${state[key].checked?"checked":""}> <b>${it}</b></label>
        <div class="desc-toggle">▼ 解説を見る</div>
        <div class="desc">${DESC[key] || ""}</div>
        <textarea placeholder="ここにメモを入力...">${state[key].memo || ""}</textarea>
      `;
      // 入力イベントで即時保存
      div.querySelector("input").onchange = (e) => { state[key].checked = e.target.checked; saveToLocal(); render(); buildTOC(); };
      div.querySelector("textarea").oninput = (e) => { state[key].memo = e.target.value; saveToLocal(); };
      div.querySelector(".desc-toggle").onclick = () => {
        const d = div.querySelector(".desc");
        d.style.display = (d.style.display === "block") ? "none" : "block";
      };
      c.appendChild(div);
    });
  });
}

function buildTOC(){
  const toc = document.getElementById("tocList");
  toc.innerHTML = "";
  chapters.forEach(ch => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.textContent = ch.title;
    a.onclick = () => li.classList.toggle("active");
    li.appendChild(a);
    const sub = document.createElement("ul");
    ch.items.forEach(it => {
      const sli = document.createElement("li");
      sli.innerHTML = `<span style="font-size:14px; color:#666;">- ${it}</span>`;
      sub.appendChild(sli);
    });
    li.appendChild(sub);
    toc.appendChild(li);
  });
}

function saveToLocal(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function toggleFilter(){ filterMode = !filterMode; render(); }

// 初期化
state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
render(); buildTOC();
</script>
</body>
</html>
