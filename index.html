<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>終活チェックリスト（完全動作版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root { --accent:#2b6cb0; }
* { box-sizing: border-box; }
body{ font-family:sans-serif; margin:0; padding:0; background:#f0f2f5; font-size:18px; color:#333; }

.wrap{ max-width:800px; margin:0 auto; background:#fff; padding:20px; min-height:100vh; box-shadow:0 0 20px rgba(0,0,0,0.1); }
@media (max-width: 600px) { .wrap { padding: 10px; } body { font-size: 16px; } }

.banner-container img { max-width:100%; height:auto; border-radius:8px; display:block; margin:0 auto; }

/* メインレイアウト */
.main { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }

/* 目次（章の開閉） */
nav.toc { border: 2px solid var(--accent); border-radius: 8px; padding: 12px; background: #fafafa; }
nav.toc ul { list-style: none; padding: 0; margin: 0; }
nav.toc li { border-bottom: 1px solid #eee; }
nav.toc li a { display: block; padding: 12px; color: var(--accent); font-weight: bold; text-decoration: none; cursor: pointer; position: relative; }
nav.toc li a::after { content: "▼"; position: absolute; right: 10px; }
nav.toc li.active a::after { content: "▲"; }
nav.toc ul ul { display: none; padding-left: 15px; background: #fff; }
nav.toc li.active ul { display: block; }

/* 本文エリア */
.content { border: 2px solid #e2e8f0; border-radius: 8px; height: 500px; overflow-y: scroll; padding: 15px; -webkit-overflow-scrolling: touch; }
.chapter-title { background: #f0f4f8; padding: 10px; font-weight: bold; position: sticky; top: 0; border-left: 6px solid var(--accent); margin: 20px 0 10px; z-index: 10; }

.item { padding: 15px 0; border-bottom: 1px solid #eee; }
.item.checked { background: #e6ffe6; border-left: 4px solid #4caf50; padding-left: 10px; }
textarea { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }

/* ボタンエリア */
.controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 25px 0; padding-top: 15px; border-top: 2px solid #eee; }
button { flex: 1 1 140px; max-width: 200px; padding: 15px 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }

.footer-info { margin-top: 40px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="banner-container">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="メインビジュアル">
  </div>

  <div class="main">
    <nav class="toc">
      <p style="font-weight:bold; margin:0 0 10px;">【目次：章をタップして開く】</p>
      <ul id="tocList"></ul>
    </nav>
    <div class="content" id="contentArea"></div>
  </div>

  <div class="controls">
    <button onclick="toggleFilter()" style="background:#555;">未完了のみ</button>
    <button onclick="downloadBackup()" style="background:#2b6cb0;">データ保存</button>
    <button onclick="document.getElementById('excelInput').click()" style="background:#718096;">Excel・データ読込</button>
    <button onclick="exportExcel()" style="background:#2f855a;">Excel出力</button>
    <button onclick="window.print()" style="background:#1a202c;">印刷</button>
  </div>

  <input type="file" id="excelInput" style="display:none" onchange="handleFile(event)" accept=".json,.xlsx,.xls">

  <div class="footer-info">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg" style="width:100%; margin-bottom:20px;">
    <div style="text-align:center;">
        <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012100.jpg" style="width:150px;">
        <p><a href="https://life-supporter.jp/lp/HRSuykFf" style="color:blue; font-weight:bold;">体験版サイトはこちら</a></p>
    </div>
  </div>
</div>

<script>
// データ定義
const chapters = [
  { id:1, title:"第1章 お金と財産管理", items:["銀行口座の一覧","通帳・キャッシュカード","年金手続き","保険契約","株式・不動産","借金・ローン","公共料金","財産目録","相続税試算","遺産分割"]},
  { id:2, title:"第2章 介護・生活サポート", items:["介護の希望","施設候補","介護保険","見守りサービス","家事支援","緊急連絡網","身元保証人","介護費用","感謝の手紙","住まいの決定"]},
  { id:3, title:"第3章 医療・健康管理", items:["かかりつけ医","持病・服薬記録","医療保険証","延命治療の意思","臓器提供","入院セット","成年後見制度","緊急医療カード","健康診断記録","在宅医療"]},
  { id:4, title:"第4章 心・人生の整理", items:["エンディングノート","家族への言葉","写真・日記整理","自分史作成","大切な物の譲り先","デジタル遺品","ペットの世話","宗教・信仰","相談相手","趣味の後継者"]},
  { id:5, title:"第5章 葬儀・供養", items:["葬儀の規模","葬儀社相談","お墓の準備","納骨・樹木葬","戒名・法名","音楽・花指定","遺影写真","香典の扱い","連絡先リスト","死後の手続き"]},
  { id:6, title:"第6章 デジタル遺産", items:["スマホロック解除","パスワード保管","ネット銀行","サブスク解約","SNS対応","クラウド写真","電子マネー","暗号資産","非公開データ","ネットの友人"]}
];

const STORAGE_KEY = "shukatsu_v7_final";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let filterMode = false;

// 描画
function render() {
  const container = document.getElementById("contentArea");
  const pos = container.scrollTop;
  container.innerHTML = "";
  chapters.forEach(ch => {
    const t = document.createElement("div");
    t.className = "chapter-title";
    t.textContent = ch.title;
    container.appendChild(t);
    ch.items.forEach((item, i) => {
      const key = `ch${ch.id}-${i}`;
      if (!state[key]) state[key] = { checked: false, memo: "" };
      if (filterMode && state[key].checked) return;
      const div = document.createElement("div");
      div.className = "item" + (state[key].checked ? " checked" : "");
      div.id = key;
      div.innerHTML = `
        <label style="display:block;"><input type="checkbox" ${state[key].checked?"checked":""} onchange="update('${key}', 'checked', this.checked)"><b> ${item}</b></label>
        <textarea oninput="update('${key}', 'memo', this.value)" placeholder="メモ...">${state[key].memo}</textarea>
      `;
      container.appendChild(div);
    });
  });
  container.scrollTop = pos;
}

// 目次作成
function buildTOC() {
  const list = document.getElementById("tocList");
  list.innerHTML = "";
  chapters.forEach(ch => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.textContent = ch.title;
    a.onclick = () => li.classList.toggle("active");
    li.appendChild(a);
    const ul = document.createElement("ul");
    ch.items.forEach((item, i) => {
      const sub = document.createElement("li");
      sub.innerHTML = `<a onclick="document.getElementById('ch${ch.id}-${i}').scrollIntoView()">${item}</a>`;
      ul.appendChild(sub);
    });
    li.appendChild(ul);
    list.appendChild(li);
  });
}

// データ更新
function update(key, prop, val) { 
  state[key][prop] = val; 
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(prop === 'checked') { render(); buildTOC(); }
}

function toggleFilter() { filterMode = !filterMode; render(); }

// --- スマホでのファイル保存（ダウンロード） ---
function downloadBackup() {
  try {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "shukatsu_backup.json";
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }, 100);
  } catch (e) {
    alert("保存に失敗しました。標準のブラウザ（ChromeやSafari）を使用してください。");
  }
}

// --- Excel・データ読込処理 ---
function handleFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === "xlsx" || ext === "xls") {
    // Excel読み込み処理
    reader.onload = (evt) => {
      const bstr = evt.target.result;
      const wb = XLSX.read(bstr, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws);
      data.forEach(row => {
        if(row.ID) {
          state[row.ID] = { checked: row.完了 === "〇", memo: row.メモ || "" };
        }
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render(); buildTOC();
      alert("Excelデータを読み込みました");
    };
    reader.readAsBinaryString(file);
  } else {
    // JSON読み込み処理
    reader.onload = (evt) => {
      try {
        state = JSON.parse(evt.target.result);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render(); buildTOC();
        alert("データを読み込みました");
      } catch(err) { alert("正しいデータ形式ではありません"); }
    };
    reader.readAsText(file);
  }
}

// Excel出力
function exportExcel() {
  const rows = Object.keys(state).map(k => ({ ID: k, 完了: state[k].checked ? "〇" : "", メモ: state[k].memo }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "終活リスト");
  XLSX.writeFile(wb, "shukatsu_list.xlsx");
}

// 初期化実行
render();
buildTOC();
</script>
</body>
</html>
