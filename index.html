<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終活チェックリスト</title>
<style>
  body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f0f2f5; }
  .wrap { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ccc; }
  .btn-save { background: #e53e3e; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
  .btn-load { background: #718096; color: white; padding: 10px; width: 100%; border: none; border-radius: 8px; margin-top: 10px; }
  .status-area { margin: 15px 0; padding: 15px; background: #fff5f5; border: 2px dashed #e53e3e; border-radius: 8px; text-align: center; display: none; }
  .item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
  h2 { text-align: center; color: #2b6cb0; }
  .guide { font-size: 14px; color: #666; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="wrap">
  <h2>マイライフチェック</h2>
  <p class="guide">※入力した内容は、下のボタンで保存できます。</p>

  <div id="itemList">
    <div class="item">
      <input type="checkbox" id="item1"> <label for="item1"><b>銀行口座の整理</b></label><br>
      <textarea id="memo1" style="width:100%;" placeholder="メモを入力"></textarea>
    </div>
  </div>

  <div id="saveStep" class="status-area">
    <p style="margin:0 0 10px 0;">保存するファイル名：<br><b style="font-size:20px; color:#000;">life-check.json</b></p>
    <button class="btn-save" onclick="execDownload()">↑ この名前で保存を確定する</button>
    <p style="font-size:12px; color: #666; margin-top:10px;">※ボタンを押した後、画面に出る「許可」や「ダウンロード」を押してください。</p>
  </div>

  <button id="mainSaveBtn" class="btn-save" onclick="prepareSave()">内容を保存する</button>
  
  <button class="btn-load" onclick="document.getElementById('fileInput').click()">保存したファイルを読み込む</button>
  <input type="file" id="fileInput" style="display:none" onchange="loadFile(event)">

  <p style="font-size:13px; color:#888; margin-top:20px;">
    【保存した場所の探し方】<br>
    iPhoneのホーム画面にある青いフォルダの形をした<b>「ファイル」アプリ</b>の中に保存されます。
  </p>
</div>

<script>
// 保存の準備ステップ
function prepareSave() {
  document.getElementById('saveStep').style.display = 'block';
  document.getElementById('mainSaveBtn').style.display = 'none';
  // 画面を保存エリアまで自動スクロール
  document.getElementById('saveStep').scrollIntoView({behavior: 'smooth'});
}

// 実際のダウンロード実行
function execDownload() {
  // 保存するデータを作成
  const data = {
    check1: document.getElementById('item1').checked,
    memo1: document.getElementById('memo1').value,
    date: new Date().toLocaleString()
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  
  a.href = url;
  a.download = "life-check.json"; // 指定のファイル名
  document.body.appendChild(a);
  a.click();
  
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    // 元に戻す
    alert("保存の指示を出しました。\n画面に「ダウンロードしますか？」と出たら許可を押してください。");
    document.getElementById('saveStep').style.display = 'none';
    document.getElementById('mainSaveBtn').style.display = 'block';
  }, 500);
}

// 読み込み処理
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = JSON.parse(e.target.result);
    document.getElementById('item1').checked = data.check1;
    document.getElementById('memo1').value = data.memo1;
    alert("読み込みました。");
  };
  reader.readAsText(file);
}
</script>

</body>
</html>
