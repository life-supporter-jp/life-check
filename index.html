<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終活チェックリスト</title>
<style>
  :root { --accent:#2b6cb0; }
  body { font-family: "Hiragino Kaku Gothic ProN", sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
  .wrap { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  h2 { text-align: center; color: var(--accent); }
  .item { border-bottom: 2px solid #eee; padding: 15px 0; }
  textarea { width: 100%; height: 100px; margin-top: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; padding: 8px; }
  .btn-save { background: #e53e3e; color: white; padding: 20px; width: 100%; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
  .btn-load { background: #718096; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; margin-top: 10px; font-size: 16px; cursor: pointer; }
  /* 保存確認エリア */
  .confirm-box { display: none; background: #fff5f5; border: 3px solid #e53e3e; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<div class="wrap">
  <h2>マイライフチェック</h2>

  <div id="checklist">
    <div class="item">
      <input type="checkbox" id="check1" style="transform: scale(1.5);"> 
      <label for="check1" style="font-size: 18px; font-weight: bold; margin-left: 10px;">銀行口座の整理</label>
      <textarea id="memo1" placeholder="メモを入力してください"></textarea>
    </div>
  </div>

  <button id="saveStartBtn" class="btn-save" onclick="startSave()">今の内容を保存する</button>

  <div id="confirmArea" class="confirm-box">
    <p style="font-weight: bold; margin-bottom: 10px;">以下のファイル名で保存します</p>
    <div style="font-size: 22px; font-weight: bold; background: #eee; display: inline-block; padding: 5px 15px; border-radius: 5px; margin-bottom: 15px;">
      life-check.json
    </div>
    <button class="btn-save" style="margin-top:0;" onclick="finalDownload()">この名前で保存を確定</button>
    <button onclick="cancelSave()" style="background:none; border:none; color:blue; text-decoration:underline; margin-top:10px; display:block; width:100%;">戻る</button>
  </div>

  <button id="loadBtn" class="btn-load" onclick="document.getElementById('fileIn').click()">保存したデータを開く</button>
  <input type="file" id="fileIn" style="display:none" onchange="readJSON(event)">

  <div style="margin-top:20px; font-size:14px; background:#eef; padding:15px; border-radius:10px; color:#555;">
    <b>【操作のヒント】</b><br>
    「確定」を押すと、画面の下の方に「ダウンロードしますか？」や「表示」といった案内が出ます。そこをタップして進めてください。
  </div>
</div>

<script>
// 状態管理
let state = JSON.parse(localStorage.getItem("life-check-v4") || "{}");

function startSave() {
  document.getElementById('confirmArea').style.display = 'block';
  document.getElementById('saveStartBtn').style.display = 'none';
  document.getElementById('loadBtn').style.display = 'none';
}

function cancelSave() {
  document.getElementById('confirmArea').style.display = 'none';
  document.getElementById('saveStartBtn').style.display = 'block';
  document.getElementById('loadBtn').style.display = 'block';
}

// 実際のダウンロード処理
function finalDownload() {
  // データの取得
  state = {
    c1: document.getElementById('check1').checked,
    m1: document.getElementById('memo1').value,
    time: new Date().toLocaleString()
  };

  const jsonStr = JSON.stringify(state, null, 2);
  
  // iPhoneが「ファイル保存」として認識しやすいデータ形式に変更
  const blob = new Blob([jsonStr], { type: "application/octet-stream" });
  const url = window.URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = "life-check.json";
  
  // Safariで確実にポップアップを出すための処理
  document.body.appendChild(a);
  a.click();
  
  setTimeout(() => {
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);
    // 完了通知
    alert("保存の案内を画面に出しました。ダウンロードを許可してください。");
    cancelSave();
  }, 500);
}

// 読み込み処理
function readJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      state = JSON.parse(ev.target.result);
      document.getElementById('check1').checked = state.c1;
      document.getElementById('memo1').value = state.m1;
      alert("読み込みました。");
    } catch(err) {
      alert("ファイルが正しくありません。");
    }
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
