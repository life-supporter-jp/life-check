<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終活チェックリスト</title>
<style>
  :root { --accent:#2b6cb0; }
  body { font-family: "Hiragino Kaku Gothic ProN", sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
  .wrap { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  h2 { text-align: center; color: var(--accent); }
  .item { border-bottom: 2px solid #eee; padding: 15px 0; }
  textarea { width: 100%; height: 100px; margin-top: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; padding: 8px; }
  
  /* ボタンをさらに大きく、押しやすく */
  .btn-save { background: #e53e3e; color: white; padding: 20px; width: 100%; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 0 #b91c1c; }
  .btn-save:active { transform: translateY(2px); box-shadow: 0 2px 0 #b91c1c; }
  .btn-load { background: #718096; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; margin-top: 15px; font-size: 16px; cursor: pointer; }
  
  /* 保存確認エリア */
  .confirm-box { display: none; background: #fff5f5; border: 3px solid #e53e3e; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<div class="wrap">
  <h2>マイライフチェック</h2>

  <div id="checklist">
    <div class="item">
      <input type="checkbox" id="check1" style="transform: scale(1.8);"> 
      <label for="check1" style="font-size: 18px; font-weight: bold; margin-left: 10px;">銀行口座の整理</label>
      <textarea id="memo1" placeholder="メモを入力してください"></textarea>
    </div>
  </div>

  <button id="startBtn" class="btn-save" onclick="openConfirm()">内容を保存する</button>

  <div id="confirmArea" class="confirm-box">
    <p style="font-weight: bold; font-size: 18px;">【最終確認】</p>
    <p>名前：<b style="font-size: 22px;">life-check.json</b></p>
    
    <button id="finalBtn" class="btn-save" style="margin-top:0;">この名前で保存を確定</button>
    
    <button onclick="closeConfirm()" style="background:none; border:none; color:blue; text-decoration:underline; margin-top:15px; display:block; width:100%; font-size: 16px;">戻る</button>
  </div>

  <button id="loadBtn" class="btn-load" onclick="document.getElementById('fileIn').click()">保存したデータを開く</button>
  <input type="file" id="fileIn" style="display:none" onchange="loadData(event)">
</div>

<script>
let state = JSON.parse(localStorage.getItem("shukatsu-final-v5") || "{}");

function openConfirm() {
  document.getElementById('confirmArea').style.display = 'block';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('loadBtn').style.display = 'none';
  
  // 「確定ボタン」に直接ダウンロード機能を紐付ける（これが一番確実）
  document.getElementById('finalBtn').onclick = function() {
    executeDownload();
  };
}

function closeConfirm() {
  document.getElementById('confirmArea').style.display = 'none';
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('loadBtn').style.display = 'block';
}

function executeDownload() {
  // データの準備
  state = {
    c1: document.getElementById('check1').checked,
    m1: document.getElementById('memo1').value,
    ts: new Date().getTime()
  };

  const jsonStr = JSON.stringify(state);
  // iPhoneに「中身を見ずに保存せよ」と命令する形式
  const blob = new Blob([jsonStr], { type: "application/octet-stream" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = "life-check.json";
  document.body.appendChild(a);
  a.click();
  
  // 実行後、少し待ってから案内を出す
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert("「ダウンロードしますか？」と出たら、『ダウンロード』を押してください。\nその後、この画面は元に戻ります。");
    closeConfirm();
  }, 300);
}

function loadData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    state = JSON.parse(ev.target.result);
    document.getElementById('check1').checked = state.c1;
    document.getElementById('memo1').value = state.m1;
    alert("読み込みが完了しました。");
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
