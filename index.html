<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>終活チェックリスト（スマホ完全対応版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root { --accent:#2b6cb0; }
* { box-sizing: border-box; }

body{
  font-family:"Hiragino Kaku Gothic Pro","Noto Sans JP",sans-serif;
  margin: 0; padding: 0; font-size:16px; color: #333; background-color: #f0f2f5;
  line-height: 1.4;
}

.wrap{ 
  width: 100%; max-width: 800px; margin: 0 auto; background-color: #fff; min-height: 100vh;
  padding: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* スマホ表示の修正：幅を固定せず100%にする */
@media (max-width: 800px) {
  .wrap { padding: 10px; }
  body { font-size: 15px; }
}

.banner-container { width: 100%; text-align: center; margin-bottom: 20px; }
.banner-container img { max-width: 100%; height: auto; border-radius: 8px; }

.main{ display:flex; flex-direction:column; gap:16px; }

/* 目次エリアの改善 */
nav.toc{
  border:2px solid var(--accent); padding:10px; border-radius:8px; background:#fafafa;
  max-height:400px; overflow-y:auto;
}
nav.toc p { font-weight: bold; color: var(--accent); margin: 0 0 8px; font-size: 14px; }
nav.toc ul{ list-style:none; padding-left:0; margin:0; }

/* 章のデザイン */
nav.toc li > a { 
  cursor: pointer; text-decoration: none; color: var(--accent); 
  display: block; padding: 12px; font-weight: bold; border-bottom: 1px solid #eee;
  background: #fff; position: relative;
}
nav.toc li > a::after { content: "▼"; position: absolute; right: 10px; font-size: 12px; }

/* 子リスト（項目）の設定 */
nav.toc ul ul{ display:none; padding-left: 0; background: #fff; }
nav.toc li.active > ul{ display:block; }
nav.toc li.active > a::after { content: "▲"; }

nav.toc ul ul li a {
  display: block; padding: 10px 15px; font-size: 14px; color: #555;
  border-bottom: 1px dotted #ccc; text-decoration: none; font-weight: normal;
}

/* 本文エリア */
.content{
  border:2px solid #e2e8f0; padding:10px; border-radius:8px; background: #fff;
  height: 500px; overflow-y: scroll; -webkit-overflow-scrolling: touch; 
}

.chapter-title{ 
  font-size:18px; font-weight:bold; margin:20px 0 10px; border-left: 6px solid var(--accent);
  padding: 8px; background: #f0f4f8; position: sticky; top: 0; z-index: 5;
}

.item{ padding:15px 5px; border-bottom:1px solid #eee; }
.item.checked{ background:#e6ffe6; }
.item.has-memo{ border-left: 4px solid #f44336; }

textarea{ width:100%; min-height:80px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; font-size: 16px; }

.desc{ display:none; background:#f9f9f9; padding:12px; margin-top:8px; border-radius: 4px; border: 1px dotted #ccc; font-size: 14px; }
.desc-toggle{ color:#0056b3; cursor:pointer; font-size: 13px; text-decoration: underline; margin-top: 5px; display: inline-block; }

.controls{ margin:20px 0; display:flex; gap:5px; flex-wrap:wrap; justify-content: center; }
button{ padding:10px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor: pointer; font-weight: bold; font-size: 13px; flex: 1 1 45%; max-width: 150px; }

.footer-info { margin-top: 30px; text-align: left; }
</style>
</head>
<body>

<div class="wrap">
  <div class="banner-container">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="メインビジュアル">
  </div>

  <div style="text-align: center;">
    <h2 style="font-size: 22px; margin: 10px 0;">マイライフチェック</h2>
  </div>

  <div class="main">
    <nav class="toc">
      <p>【章をタップして項目を表示】</p>
      <ul id="tocList"></ul>
    </nav>
    
    <div class="content" id="contentArea">
      </div>
  </div>

  <div class="controls">
    <button onclick="toggleFilter()" style="background: #555;">未完了のみ</button>
    <button onclick="downloadBackup()">データ保存</button>
    <button onclick="loadJSON()" style="background: #718096;">データ読込</button>
    <button onclick="exportExcel()" style="background: #2f855a;">Excel出力</button>
    <button onclick="window.print()" style="background: #1a202c;">印刷</button>
  </div>

  <div class="footer-info">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg" style="width:100%;">
    <p style="text-align:center; margin:20px 0;">
      <a href="https://life-supporter.jp/lp/HRSuykFf" style="color:blue; font-weight:bold;">体験版はこちら</a>
    </p>
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012100.jpg" style="width:150px; display:block; margin:auto;">
  </div>
  <input type="file" id="jsonFile" style="display:none">
</div>

<script>
// データ定義
const chapters = [
  { id:1, title:"第1章 お金と財産管理", items:["銀行口座の一覧","通帳・カード整理","年金手続き","保険契約","株式・不動産","借金・ローン","公共料金","財産目録","相続税試算","遺産分割"]},
  { id:2, title:"第2章 介護・生活サポート", items:["介護の希望","施設候補","介護保険","見守りサービス","家事支援","緊急連絡網","身元保証人","介護費用","感謝の手紙","住まいの決定"]}
  // ...必要に応じて追加
];

const DESC = { "ch1-0": "口座の一覧化は基本です...", "ch1-1": "通帳の場所を明確にしましょう..." };

let state = JSON.parse(localStorage.getItem("shukatsu-mobile-v1") || "{}");
let filterMode = false;

function idFor(chId, i){ return "ch" + chId + "-" + i; }

function render(){
  const container = document.getElementById("contentArea");
  container.innerHTML = "";
  
  chapters.forEach(ch => {
    const titleDiv = document.createElement("div");
    titleDiv.className = "chapter-title";
    titleDiv.textContent = ch.title;
    container.appendChild(titleDiv);
    
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      if(!state[key]) state[key] = {checked:false, memo:""};
      if(filterMode && state[key].checked) return;
      
      const div = document.createElement("div");
      div.className = "item" + (state[key].checked?" checked":"") + (state[key].memo?" has-memo":"");
      div.id = key;
      div.innerHTML = `
        <label style="display:block; cursor:pointer;">
          <input type="checkbox" ${state[key].checked?"checked":""}> <b>${it}</b>
        </label>
        <div class="desc-toggle">▼ 解説</div>
        <div class="desc">${DESC[key] || "解説準備中"}</div>
        <textarea placeholder="メモ...">${state[key].memo || ""}</textarea>
      `;
      
      const cb = div.querySelector("input");
      const ta = div.querySelector("textarea");
      
      cb.onchange = () => { state[key].checked = cb.checked; save(); render(); buildTOC(); };
      ta.oninput = () => { state[key].memo = ta.value; save(); buildTOC(); };
      div.querySelector(".desc-toggle").onclick = () => {
        const d = div.querySelector(".desc");
        d.style.display = (d.style.display === "block") ? "none" : "block";
      };
      container.appendChild(div);
    });
  });
}

function buildTOC(){
  const tocList = document.getElementById("tocList");
  tocList.innerHTML = "";
  
  chapters.forEach(ch => {
    const li = document.createElement("li");
    let done = 0;
    ch.items.forEach((item, i) => { if(state[idFor(ch.id, i)]?.checked) done++; });
    const percent = Math.round(done / ch.items.length * 100);
    
    const a = document.createElement("a");
    a.innerHTML = `${ch.title} (${percent}%)`;
    
    // タップで開閉
    a.onclick = (e) => {
      e.preventDefault();
      const isActive = li.classList.contains("active");
      document.querySelectorAll("#tocList li").forEach(el => el.classList.remove("active"));
      if(!isActive) li.classList.add("active");
    };
    
    li.appendChild(a);
    
    const subUl = document.createElement("ul");
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      const subLi = document.createElement("li");
      const subA = document.createElement("a");
      subA.textContent = it + (state[key]?.memo ? " (メモ有)" : "");
      subA.onclick = (e) => {
        e.preventDefault();
        const target = document.getElementById(key);
        if(target) target.scrollIntoView({behavior:"smooth", block:"start"});
      };
      subLi.appendChild(subA);
      subUl.appendChild(subLi);
    });
    li.appendChild(subUl);
    tocList.appendChild(li);
  });
}

function save(){ localStorage.setItem("shukatsu-mobile-v1", JSON.stringify(state)); }

function toggleFilter(){ filterMode = !filterMode; render(); }

// 初期化
render();
buildTOC();
</script>

</body>
</html>
