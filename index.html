<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>終活チェックリスト（画像・QRコード対応版）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root { --accent:#2b6cb0; }
* { box-sizing: border-box; }

body{
  font-family:"Hiragino Kaku Gothic Pro","Noto Sans JP",sans-serif;
  margin: 0; padding: 0; font-size:18px; color: #333; background-color: #f0f2f5;
}

.wrap{ 
  max-width: 800px; margin: 0 auto; background-color: #fff; min-height: 100vh;
  padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

@media (max-width: 800px) { .wrap { max-width: 100%; padding: 10px; } }

.banner-container { width: 100%; text-align: center; margin-bottom: 20px; }
.banner-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 8px; }

/* QR表示エリア */
#qrcode-container {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: white; padding: 20px; border: 2px solid #333; z-index: 1000; text-align: center;
  box-shadow: 0 0 100px rgba(0,0,0,0.5); border-radius: 10px;
}
#qrcode { margin: 15px auto; }
.qr-close { cursor: pointer; background: #555; color: white; padding: 5px 15px; border-radius: 4px; border: none; }

.main{ display:flex; flex-direction:column; gap:16px; }

/* 目次エリア */
nav.toc{
  border:1px solid #eee; padding:12px; border-radius:8px; background:#fafafa;
  max-height:450px; overflow-y:auto;
}
nav.toc ul{ list-style:none; padding-left:0; margin:0; }
nav.toc ul ul{ display:none; padding-left: 20px; border-top: 1px dashed #ddd; margin-top: 5px; padding-bottom: 10px; }
nav.toc li.active > ul{ display:block; }
nav.toc li > a { cursor: pointer; text-decoration: none; color: var(--accent); display: block; padding: 10px 0; font-weight: bold; border-bottom: 1px solid #eee; }

/* 本文エリア */
.content{
  border:2px solid #e2e8f0; padding:0 15px; border-radius:8px; background: #fff;
  height: 600px; overflow-y: scroll; -webkit-overflow-scrolling: touch; position: relative; margin-top: 10px;
}

.chapter-title{ 
  font-size:20px; font-weight:bold; margin:25px 0 10px; border-left: 6px solid var(--accent);
  padding: 5px 12px; background: #f0f4f8; position: sticky; top: 0; z-index: 5;
}

.item{ padding:15px 0; border-bottom:1px solid #eee; }
.item.checked{ background:#e6ffe6; border-left: 4px solid #4caf50; padding-left: 10px; }
.item.has-memo{ border-left: 4px solid #f44336; padding-left: 10px; }

textarea{ width:100%; min-height:80px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; box-sizing: border-box; font-size: 16px; }

.desc{ display:none; background:#f9f9f9; padding:12px; margin-top:8px; border-radius: 4px; border: 1px dotted #ccc; font-size: 15px; line-height: 1.6; color: #444; }
.desc-toggle{ color:#0056b3; cursor:pointer; font-size: 14px; text-decoration: underline; margin-top: 5px; display: inline-block; }

.controls{ margin:20px 0; display:flex; gap:8px; flex-wrap:wrap; justify-content: center; border-bottom: 2px solid #eee; padding-bottom: 20px; }
button{ padding:10px 15px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor: pointer; font-weight: bold; font-size: 14px; }

.footer-info { margin-top: 40px; padding: 20px 0; text-align: left; }
.info-text-bold { font-size: 18px; font-weight: bold; line-height: 1.6; display: block; margin-bottom: 20px; }

@media print { .controls, nav.toc, .desc-toggle, #qrcode-container { display: none !important; } .content { height: auto; overflow: visible; } }
</style>
</head>
<body>

<div class="wrap">
  <div class="banner-container">
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012099.jpg" alt="メインビジュアル">
  </div>

  <div style="text-align: center;">
    <p><font size="4" color="#0000ff">これからの人生をどう彩るかという設計図です</font></p>
    <h2 style="font-size: 26px; margin: 10px 0;">マイライフチェック</h2>
  </div>

  <div id="qrcode-container">
    <p style="font-size: 14px; font-weight: bold;">このQRコードをカメラで読み取ると<br>データを別の端末へ送れます</p>
    <div id="qrcode"></div>
    <button class="qr-close" onclick="closeQR()">閉じる</button>
  </div>

  <div class="main">
    <nav class="toc">
      <p style="font-size: 13px; color: #888; margin-bottom: 8px;">▼クリックで章を開閉します（勝手にスクロールしません）</p>
      <ul id="tocList"></ul>
    </nav>
    <div class="content" id="contentArea"></div>
  </div>

  <div class="controls">
    <button onclick="toggleFilter()" style="background: #555;">未完了のみ</button>
    <button onclick="downloadBackup()">データ保存 (JSON)</button>
    <button onclick="loadJSON()" style="background: #718096;">データ読込</button>
    <button onclick="exportExcel()" style="background: #2f855a;">Excel出力</button>
    <button onclick="generateQR()" style="background: #e53e3e;">QRコード表示</button>
    <button onclick="window.print()" style="background: #1a202c;">印刷</button>
  </div>

  <div class="footer-info">
    <span class="info-text-bold">
      今回のアプリは如何だったでしょうか？他にも使えるアプリ、脳トレができるゲームや趣味に俳句、和歌などが利用できるサイトをご案内します。また大事な記録をサーバーに残せるサイトで、何かあった時に情報開示も指定できるサイトです。スマホのID、PWを記録しておくと安心です。
    </span>
    
    <p><br></p>
    <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012085.jpg" style="display: block; margin: auto; max-width: 100%;">
    <p><br></p>
    
    <div style="text-align: center;">
      <span style="font-size: 24px;"><b>以下より体験版をご確認ください。</b></span>
    </div>
    
    <p style="text-align: center;">
      <img src="https://life-supporter.jp/sp/hxySQ4ff/ct5NJq8Z/images/XS012100.jpg" style="width: 200px;">
    </p>
    
    <div style="text-align: center; margin-bottom: 50px;">
      <a href="https://life-supporter.jp/lp/HRSuykFf" style="text-decoration:none;">
        <span style="font-size: 20px; color: rgb(0, 0, 255); font-weight: bold; border-bottom: 1px solid blue;">
          https://life-supporter.jp/lp/HRSuykFf
        </span>
      </a>
    </div>
  </div>
  <input type="file" id="jsonFile" style="display:none">
</div>

<script>
// --- [データ定義部分は前回のものと同じなので省略] ---
const DESC = { /* ご提示の全文を入れる */ };
const chapters = [ /* 第1章〜第6章のリスト */ ];

let state={};
let filterMode=false;
const STORAGE_KEY = "shukatsu-plus-v2";

function idFor(chId, i){ return "ch" + chId + "-" + i; }

function render(){
  const c = document.getElementById("contentArea");
  const currentScroll = c.scrollTop;
  c.innerHTML = "";
  chapters.forEach(ch => {
    const title = document.createElement("div");
    title.className = "chapter-title";
    title.textContent = ch.title;
    c.appendChild(title);
    
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      if(!state[key]) state[key] = {};
      if(filterMode && state[key].checked) return;
      
      const div = document.createElement("div");
      div.className = "item" + (state[key].checked?" checked":"") + (state[key].memo?" has-memo":"");
      div.id = key;
      div.innerHTML = `
        <input type="checkbox" ${state[key].checked?"checked":""}> <b>${it}</b>
        <div class="desc-toggle">▼ 解説を読む</div>
        <div class="desc">${DESC[key] || "解説準備中..."}</div>
        <textarea placeholder="メモを入力...">${state[key].memo || ""}</textarea>
      `;
      
      const cb = div.querySelector("input");
      const ta = div.querySelector("textarea");
      cb.onchange = () => { state[key].checked = cb.checked; save(); render(); buildTOC(); };
      ta.oninput = () => { state[key].memo = ta.value; save(); buildTOC(); };
      div.querySelector(".desc-toggle").onclick = () => {
        const d = div.querySelector(".desc");
        d.style.display = (d.style.display === "block") ? "none" : "block";
      };
      c.appendChild(div);
    });
  });
  c.scrollTop = currentScroll;
}

function buildTOC(){
  const toc = document.getElementById("tocList");
  toc.innerHTML = "";
  chapters.forEach(ch => {
    const li = document.createElement("li");
    let done = 0;
    ch.items.forEach((it, i) => { if(state[idFor(ch.id, i)]?.checked) done++; });
    const percent = Math.round(done / ch.items.length * 100);
    const a = document.createElement("a");
    a.innerHTML = `${ch.title} <span style="color:red">●</span> ${percent}%`;
    a.onclick = (e) => { e.preventDefault(); li.classList.toggle("active"); };
    li.appendChild(a);
    const sub = document.createElement("ul");
    ch.items.forEach((it, i) => {
      const key = idFor(ch.id, i);
      const subli = document.createElement("li");
      const sa = document.createElement("a");
      sa.style.fontSize = "14px"; sa.style.fontWeight = "normal";
      sa.innerHTML = it + (state[key]?.memo ? " <b style='color:black'>●</b>" : "");
      sa.onclick = (e) => { 
        e.preventDefault(); 
        document.getElementById(key).scrollIntoView({behavior:"smooth", block:"start"}); 
      };
      subli.appendChild(sa); sub.appendChild(subli);
    });
    li.appendChild(sub); toc.appendChild(li);
  });
}

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// --- QRコード表示機能 ---
function generateQR() {
  const qrArea = document.getElementById("qrcode");
  qrArea.innerHTML = ""; // クリア
  const data = JSON.stringify(state);
  
  // URLの長さ制限対策として、必要なら圧縮や短縮URLを検討しますが、
  // ここではシンプルに現在の状態を保持するQRを生成（データ量に注意）
  new QRCode(qrArea, {
    text: data,
    width: 256,
    height: 256
  });
  document.getElementById("qrcode-container").style.display = "block";
}
function closeQR() { document.getElementById("qrcode-container").style.display = "none"; }

function downloadBackup(){
  const blob = new Blob([JSON.stringify(state)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "shukatsu_data.json";
  a.click();
}

function loadJSON(){ document.getElementById("jsonFile").click(); }
document.getElementById("jsonFile").onchange = (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => { try { state = JSON.parse(reader.result); save(); render(); buildTOC(); } catch(e){ alert("形式が違います"); } };
  reader.readAsText(file);
};

function exportExcel(){
  const data = [];
  for(let key in state){ data.push({ 項目:key, 完了:state[key].checked?"〇":"", メモ:state[key].memo||"" }); }
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Data");
  XLSX.writeFile(wb, "shukatsu_checklist.xlsx");
}

function toggleFilter(){ filterMode = !filterMode; render(); }

state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
render();
buildTOC();
</script>
</body>
</html>
